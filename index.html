<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMAX - Streaming App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body, html {
            background-color: #0b111e; /* Netflix Dark Blue-Black Tone */
            color: #fff; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVIGATION BAR */
        .header {
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 70px; 
            background: linear-gradient(to bottom, rgba(11, 17, 30, 0.95), rgba(11, 17, 30, 0.8));
            backdrop-filter: blur(10px);
            z-index: 1000; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 4%;
        }
        .logo {
            color: #fff; 
            font-size: 26px; 
            font-weight: 700; 
            letter-spacing: 1px; 
            cursor: pointer;
        }
        .header-icons {
            display: flex; 
            gap: 22px; 
            align-items: center;
        }
        .header-icons svg {
            width: 22px; 
            height: 22px; 
            cursor: pointer; 
            fill: #fff;
            opacity: 0.8;
            transition: 0.3s;
        }
        .header-icons svg:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* FILTER BAR (IMAGE 2 STYLE) */
        .filter-container {
            margin-top: 70px; 
            background: #0b111e; 
            padding: 20px 4% 15px 4%; 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .filter-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-label {
            color: #4a5a73;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            padding-left: 4px;
        }
        .custom-select {
            background: #111a2e; 
            border: 1.5px solid #1a263f; 
            color: #fff; 
            padding: 10px 24px 10px 16px; 
            border-radius: 25px; 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer; 
            outline: none;
            min-width: 120px;
            transition: all 0.3s;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
        }
        .custom-select:focus {
            border-color: #3b82f6; /* Blue highlight from image */
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        .search-bar {
            background: #111a2e; 
            border: 1.5px solid #1a263f; 
            color: #fff; 
            padding: 10px 20px; 
            border-radius: 25px; 
            font-size: 13px; 
            outline: none;
            width: 220px;
            transition: 0.3s;
        }
        .search-bar:focus {
            border-color: #3b82f6;
        }

        /* GRID VIEW (IMAGE 2) */
        .main-layout {
            padding: 20px 4% 40px 4%;
        }
        .shows-grid-layout {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px;
        }
        .card-item {
            cursor: pointer; 
            transition: transform 0.3s, box-shadow 0.3s; 
            position: relative; 
            border-radius: 8px; 
            overflow: hidden;
            background: #111a2e;
        }
        .card-item:hover {
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
        }
        .poster-img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .badge-tv {
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: rgba(11, 17, 30, 0.85); 
            color: #94a3b8; 
            font-size: 10px; 
            font-weight: 700; 
            padding: 2px 6px; 
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        .badge-username {
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: #ef4444; 
            color: #fff; 
            font-size: 10px; 
            font-weight: 600; 
            padding: 2px 6px; 
            border-radius: 4px;
        }
        .card-details {
            padding: 12px 8px;
        }
        .card-title {
            font-size: 14px; 
            font-weight: 600; 
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-year {
            font-size: 12px; 
            color: #64748b; 
            margin-top: 4px;
        }

        /* DETAILS PAGE (IMAGE 1 STYLE) */
        .details-container {
            display: none; 
            min-height: 100vh; 
            background: #0b111e;
            padding-bottom: 50px;
        }
        .details-container.active {
            display: block;
        }
        .hero-banner {
            position: relative; 
            height: 75vh; 
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }
        .hero-bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.6);
            transform: scale(1.1);
            z-index: 1;
        }
        .hero-main-img {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 90%;
            object-fit: cover;
            border-radius: 12px;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        .hero-overlay {
            position: absolute; 
            bottom: 0; left: 0; right: 0; 
            height: 100%; 
            background: linear-gradient(to top, #0b111e 15%, transparent 80%);
            z-index: 3;
        }
        .hero-text-content {
            position: relative;
            z-index: 4;
            padding: 0 6% 40px 6%;
            width: 100%;
        }
        .show-main-title {
            font-size: 3.5rem; 
            font-weight: 700; 
            margin-bottom: 12px;
            color: #fff;
        }
        .meta-info-row {
            display: flex; 
            gap: 12px; 
            align-items: center; 
            margin-bottom: 20px; 
            font-size: 14px; 
            color: #94a3b8; 
            flex-wrap: wrap;
        }
        .age-tag {
            background: rgba(255,255,255,0.15); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: 600;
            color: #fff;
        }
        .imdb-tag {
            background: #f5c518; 
            color: #000; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: 700;
        }
        .action-btns {
            display: flex; 
            gap: 12px; 
            margin-bottom: 25px;
        }
        .btn {
            border: none; 
            padding: 12px 35px; 
            font-size: 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: 0.2s;
        }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #e2e8f0; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; backdrop-filter: blur(5px); }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); }
        
        .synopsis {
            font-size: 15px; 
            line-height: 1.6; 
            color: #cbd5e1; 
            max-width: 750px; 
            margin-bottom: 20px;
        }
        .credits-text {
            font-size: 13px; 
            color: #64748b; 
            margin-bottom: 6px;
        }
        .credits-text strong { color: #94a3b8; font-weight: 500; }
        
        /* CAST & RELATED SECTIONS */
        .content-section { padding: 30px 6% 10px 6%; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #94a3b8; letter-spacing: 0.5px; }
        
        .cast-row { 
            display: flex; 
            gap: 30px; 
            overflow-x: auto; 
            padding-bottom: 15px;
        }
        .cast-row::-webkit-scrollbar { height: 6px; }
        .cast-row::-webkit-scrollbar-thumb { background: #1a263f; border-radius: 10px; }
        
        .cast-item-card { text-align: center; flex-shrink: 0; width: 110px; }
        .cast-img-circle { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .cast-real-name { font-size: 13px; font-weight: 500; color: #fff; }
        .cast-role-name { font-size: 11px; color: #64748b; margin-top: 2px; }
        
        .horizontal-scroll { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 15px; }
        .horizontal-scroll::-webkit-scrollbar { height: 6px; }
        .horizontal-scroll::-webkit-scrollbar-thumb { background: #1a263f; border-radius: 10px; }
        
        .scroll-card { flex-shrink: 0; width: 140px; cursor: pointer; transition: 0.3s; }
        .scroll-card:hover { transform: scale(1.05); }
        .scroll-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 6px; }

        .back-navigation {
            position: fixed; top: 85px; left: 4%; z-index: 1001; 
            background: rgba(17, 26, 46, 0.8); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; width: 40px; height: 40px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-size: 18px; backdrop-filter: blur(5px); transition: 0.2s;
        }
        .back-navigation:hover { background: #fff; color: #000; }

        /* EPISODES VIEW */
        .episodes-container { display: none; padding: 100px 6% 40px 6%; }
        .episodes-container.active { display: block; }
        .ep-list { display: flex; flex-direction: column; gap: 16px; margin-top: 25px; }
        .ep-card { display: flex; gap: 20px; background: #111a2e; padding: 16px; border-radius: 8px; align-items: center; }
        .ep-thumb-box { width: 180px; aspect-ratio: 16/9; position: relative; flex-shrink: 0; }
        .ep-thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .ep-meta-title { font-size: 16px; font-weight: 600; color: #fff; }
        .ep-summary { font-size: 13px; color: #94a3b8; margin-top: 6px; line-height: 1.5; }
        .btn-download {
            background: #ef4444; color: #fff; border: none; padding: 6px 14px; 
            border-radius: 4px; font-size: 12px; font-weight: 600; margin-top: 10px; 
            cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
        }

        @media (max-width: 768px) {
            .shows-grid-layout { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
            .show-main-title { font-size: 2.2rem; }
            .hero-banner { height: 60vh; }
            .ep-card { flex-direction: column; align-items: flex-start; }
            .ep-thumb-box { width: 100%; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="navigateToHome()">CINEMAX</div>
        <div class="header-icons">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
    </header>

    <div id="homePage">
        <div class="filter-container">
            <div class="filter-box">
                <div class="filter-label">Network</div>
                <select class="custom-select" id="networkFilter">
                    <option value="Netflix">Netflix</option>
                    <option value="Prime Video">Prime Video</option>
                </select>
            </div>
            <div class="filter-box">
                <div class="filter-label">Type</div>
                <select class="custom-select" id="typeFilter">
                    <option value="Series">Series</option>
                    <option value="Movie">Movie</option>
                </select>
            </div>
            <div class="filter-box">
                <div class="filter-label">Genre</div>
                <select class="custom-select" id="genreFilter">
                    <option value="All">All Genres</option>
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Drama">Drama</option>
                </select>
            </div>
            <div class="filter-box">
                <div class="filter-label">Year</div>
                <select class="custom-select" id="yearFilter">
                    <option value="All">All Years</option>
                    <option value="2026">2026</option>
                    <option value="2023">2023</option>
                    <option value="2016">2016</option>
                </select>
            </div>
            <input type="text" class="search-bar" id="userSearch" placeholder="Search by uploader username..." />
        </div>

        <main class="main-layout">
            <div class="shows-grid-layout" id="showsGrid"></div>
        </main>
    </div>

    <button class="back-navigation" id="backBtn" onclick="navigateToHome()">←</button>
    
    <div class="details-container" id="detailsPage">
        <div class="hero-banner">
            <img class="hero-bg-blur" id="blurHeroBg" src="">
            <img class="hero-main-img" id="mainHeroImg" src="">
            <div class="hero-overlay"></div>
            <div class="hero-text-content">
                <h1 class="show-main-title" id="showTitle">The WONDERfools</h1>
                <div class="meta-info-row" id="showMeta"></div>
                <div class="action-btns">
                    <button class="btn btn-primary" onclick="navigateToEpisodes()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> PLAY
                    </button>
                    <button class="btn btn-secondary">Trailer</button>
                </div>
                <p class="synopsis" id="showDesc"></p>
                <div class="credits-text"><strong>WRITTEN BY:</strong> <span id="showWriter"></span></div>
                <div class="credits-text"><strong>CREATED BY:</strong> <span id="showCreator"></span></div>
            </div>
        </div>

        <div class="content-section">
            <div class="section-title">CAST</div>
            <div class="cast-row" id="castContainer"></div>
        </div>

        <div class="content-section">
            <div class="section-title" id="dynamicRelatedTitle">MORE SHOWS WITH PARK EUN-BIN</div>
            <div class="horizontal-scroll" id="moreShowsContainer"></div>
        </div>

        <div class="content-section">
            <div class="section-title">YOU MAY ALSO LIKE</div>
            <div class="horizontal-scroll" id="suggestedShowsContainer"></div>
        </div>
    </div>

    <div class="episodes-container" id="episodesPage">
        <h2 id="epPageTitle" style="margin-bottom: 20px;">Episodes</h2>
        <div class="ep-list" id="episodesList"></div>
    </div>

    <script>
        // Real Mock Data from Images
        const dataset = [
            {id:'berlin_2026', title:'Berlin and the Lady...', year:2026, poster:'https://images.themoffatt.com/placeholder/berlin.jpg', genre:'Drama, Crime', network:'Netflix', type:'Series', rating:7.8, username:'kamatj8'},
            {id:'wonderfools', title:'The WONDERfools', year:2026, poster:'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/wonderfools.jpg', genre:'Action, Comedy, Sci-Fi, Drama', network:'Netflix', type:'Series', rating:9.2, username:'kamatj8'},
            {id:'stranger_things', title:'Stranger Things', year:2016, poster:'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/stranger.jpg', genre:'Sci-Fi, Horror', network:'Netflix', type:'Series', rating:8.7, username:'kamatj8'},
            {id:'boroughs', title:'The Boroughs', year:2026, poster:'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/boroughs.jpg', genre:'Sci-Fi, Drama', network:'Netflix', type:'Series', rating:8.3, username:'kamatj8'},
            {id:'berlin_2023', title:'Berlin', year:2023, poster:'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/berlin23.jpg', genre:'Drama, Action', network:'Netflix', type:'Series', rating:7.5, username:'kamatj8'},
            {id:'lucifer', title:'Lucifer', year:2016, poster:'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/lucifer.jpg', genre:'Drama, Fantasy', network:'Netflix', type:'Series', rating:8.2, username:'kamatj8'}
        ];

        const advancedShowDetails = {
            wonderfools: {
                title: 'The WONDERfools',
                year: 2026,
                rating: 'TV-14',
                imdb: '9.2',
                genres: 'Action & Adventure, Comedy, Sci-Fi & Fantasy',
                desc: 'A goofy group of townies stumbles into superpowers and fights rising evil as doomsday panic grows in this wild, turn-of-the-century action comedy.',
                writer: 'Huh Dah-joong',
                creator: 'Kang Eun-kyung, Yoo In-sik, Huh Dah-joong',
                poster: 'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/wonderfools.jpg',
                cast: [
                    {name: 'Park Eun-bin', role: 'Eun Chae-ni', img: 'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/p1.jpg'},
                    {name: 'Cha Eun-woo', role: 'Lee Un-jeong', img: 'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/p2.jpg'},
                    {name: 'Choi Dae-hoon', role: 'Son Gyeong-hun', img: 'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/p3.jpg'},
                    {name: 'Im Sung-jae', role: 'Kang Ro-bin', img: 'https://pub-c5e31b5cdafb419a824e6939b086eeaa.r2.dev/p4.jpg'}
                ],
                episodes: [
                    {title: 'Every Life Comes With a Surprise Twist', summary: 'When news of the apocalypse spreads, superpowers emerge.', srt: 'ep1_sinhala.srt'},
                    {title: 'Secrets Are Meant To Be Kept', summary: 'Eun Chae-ni and her quirky friends try to hide their abilities.', srt: 'ep2_sinhala.srt'}
                ]
            }
        };

        let currentActiveId = 'wonderfools';

        function renderGrid(shows) {
            const grid = document.getElementById('showsGrid');
            grid.innerHTML = '';
            shows.forEach(show => {
                grid.innerHTML += `
                    <div class="card-item" onclick="openDetailsPage('${show.id}')">
                        <div class="poster-wrapper">
                            <img src="${show.poster}" class="poster-img" alt="${show.title}">
                            <span class="badge-tv">tv</span>
                            <span class="badge-username">@${show.username}</span>
                        </div>
                        <div class="card-details">
                            <div class="card-title">${show.title}</div>
                            <div class="card-year">${show.year}</div>
                        </div>
                    </div>
                `;
            });
        }

        function filterContent() {
            const netVal = document.getElementById('networkFilter').value;
            const genreVal = document.getElementById('genreFilter').value;
            const yearVal = document.getElementById('yearFilter').value;
            const searchVal = document.getElementById('userSearch').value.toLowerCase();

            let results = dataset.filter(item => {
                return (netVal === 'All' || item.network === netVal) &&
                       (genreVal === 'All' || item.genre.includes(genreVal)) &&
                       (yearVal === 'All' || item.year.toString() === yearVal) &&
                       (item.username.toLowerCase().includes(searchVal));
            });
            renderGrid(results);
        }

        function openDetailsPage(id) {
            currentActiveId = id;
            const data = advancedShowDetails[id] || advancedShowDetails['wonderfools']; // Fallback to wonderfools for preview
            
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('episodesPage').classList.remove('active');
            document.getElementById('detailsPage').classList.add('active');
            document.getElementById('backBtn').style.display = 'flex';

            document.getElementById('blurHeroBg').src = data.poster;
            document.getElementById('mainHeroImg').src = data.poster;
            document.getElementById('showTitle').textContent = data.title;
            document.getElementById('showDesc').textContent = data.desc;
            document.getElementById('showWriter').textContent = data.writer;
            document.getElementById('showCreator').textContent = data.creator;
            
            document.getElementById('showMeta').innerHTML = `
                <span class="age-tag">${data.rating}</span>
                <span>2026</span>
                <span>1 Season</span>
                <span>${data.genres}</span>
                <span class="imdb-tag">IMDb ${data.imdb}</span>
            `;

            // Render Cast circles
            const castContainer = document.getElementById('castContainer');
            castContainer.innerHTML = '';
            data.cast.forEach(c => {
                castContainer.innerHTML += `
                    <div class="cast-item-card">
                        <img src="${c.img}" class="cast-img-circle">
                        <div class="cast-real-name">${c.name}</div>
                        <div class="cast-role-name">${c.role}</div>
                    </div>
                `;
            });

            document.getElementById('dynamicRelatedTitle').textContent = `MORE SHOWS WITH ${data.cast[0].name.toUpperCase()}`;
            renderScrollRows();
            window.scrollTo(0,0);
        }

        function renderScrollRows() {
            const moreShows = document.getElementById('moreShowsContainer');
            const suggested = document.getElementById('suggestedShowsContainer');
            moreShows.innerHTML = '';
            suggested.innerHTML = '';

            dataset.forEach(show => {
                const html = `
                    <div class="scroll-card" onclick="openDetailsPage('${show.id}')">
                        <img src="${show.poster}" class="scroll-poster">
                    </div>
                `;
                moreShows.innerHTML += html;
                suggested.innerHTML += html;
            });
        }

        function navigateToHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('detailsPage').classList.remove('active');
            document.getElementById('episodesPage').classList.remove('active');
            document.getElementById('backBtn').style.display = 'none';
        }

        function navigateToEpisodes() {
            document.getElementById('detailsPage').classList.remove('active');
            document.getElementById('episodesPage').classList.add('active');
            
            const data = advancedShowDetails[currentActiveId] || advancedShowDetails['wonderfools'];
            document.getElementById('epPageTitle').textContent = `${data.title} - Episodes`;
            
            const epList = document.getElementById('episodesList');
            epList.innerHTML = '';
            data.episodes.forEach((ep, index) => {
                epList.innerHTML += `
                    <div class="ep-card">
                        <div class="ep-thumb-box">
                            <img src="${data.poster}" class="ep-thumb">
                        </div>
                        <div>
                            <div class="ep-meta-title">Episode ${index + 1}: ${ep.title}</div>
                            <p class="ep-summary">${ep.summary}</p>
                            <button class="btn-download" onclick="alert('Downloading ${ep.srt}')">Download Sinhala SRT</button>
                        </div>
                    </div>
                `;
            });
        }

        // Event Listeners
        document.getElementById('networkFilter').addEventListener('change', filterContent);
        document.getElementById('genreFilter').addEventListener('change', filterContent);
        document.getElementById('yearFilter').addEventListener('change', filterContent);
        document.getElementById('userSearch').addEventListener('input', filterContent);

        // Initial Run
        renderGrid(dataset);
        document.getElementById('backBtn').style.display = 'none';
    </script>
</body>
</html>
