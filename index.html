<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>CINEMAX</title>
    <style>

        * {margin:0; padding:0; box-sizing:border-box}
        body,html {margin:0!important; padding:0!important; font-family:'Roboto',Arial,sans-serif; background:#141414; color:#fff; overflow-x:hidden}
        
        /* 1ST PHOTO - HOME PAGE FILTERS */
        .netflix-header {position:fixed; top:0; width:100%; height:68px; background:#141414; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:0 4%}
        .netflix-logo {color:#E50914; font-size:32px; font-weight:900; font-family:'Bebas Neue',sans-serif; letter-spacing:2px; cursor:pointer}
        .header-icons {display:flex; gap:20px; align-items:center}
        .header-icons svg {width:24px; height:24px; cursor:pointer; opacity:0.8}
        .header-icons svg:hover {opacity:1}

        .filter-bar {margin-top:68px; background:#141414; padding:16px 4% 24px 4%; display:flex; gap:16px; flex-wrap:wrap; align-items:center}
        .filter-dropdown {position:relative}
        .filter-btn {background:#fff; border:none; color:#000; padding:8px 20px; border-radius:4px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; min-width:100px; justify-content:space-between}
        .filter-btn:hover {background:#e6e6e6}
        .filter-label {color:#808080; font-size:13px; margin-bottom:4px}
        .search-input {background:rgba(0,0,0,0.5); border:1px solid #333; color:#fff; padding:8px 15px; border-radius:4px; font-size:14px; width:200px}
        .search-input::placeholder {color:#666}

        .main-content {padding:0 4% 40px 4%; margin-top:20px}
        .shows-grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px}
        .show-card {cursor:pointer; transition:all 0.3s; position:relative; border-radius:4px; overflow:hidden}
        .show-card:hover {transform:scale(1.08); z-index:10; box-shadow:0 8px 16px rgba(0,0,0,0.8)}
        .show-poster {width:100%; aspect-ratio:2/3; object-fit:cover; background:#1a1a1a}
        .show-title {font-size:14px; font-weight:500; margin-top:8px; color:#e5e5e5; padding:0 4px}
        .show-year {font-size:12px; color:#808080; margin-top:2px; padding:0 4px 8px 4px}
        .tv-badge {position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.8); color:#fff; font-size:10px; font-weight:700; padding:3px 6px; border-radius:2px}
        .username-badge {position:absolute; top:8px; left:8px; background:#E50914; color:#fff; font-size:10px; font-weight:700; padding:3px 6px; border-radius:2px}

        /* 2ND PHOTO - DETAILS PAGE */
        .details-page {display:none; min-height:100vh; background:#141414}
        .details-page.active {display:block}
        .details-hero {position:relative; height:85vh; overflow:hidden}
        .details-hero-img {width:100%; height:100%; object-fit:cover; object-position:center top}
        .details-hero-gradient {position:absolute; bottom:0; left:0; right:0; height:70%; background:linear-gradient(to top, #141414 0%, transparent 100%)}
        .details-hero-content {position:absolute; bottom:0; left:0; right:0; padding:0 4% 60px 4%}
        .details-title {font-size:3.5rem; font-weight:900; margin-bottom:16px; text-shadow:2px 2px 8px rgba(0,0,0,0.8)}
        .details-meta {display:flex; gap:12px; align-items:center; margin-bottom:20px; font-size:15px; color:#d2d2d2; flex-wrap:wrap}
        .meta-badge {background:rgba(255,255,255,0.2); padding:3px 8px; border-radius:3px; font-weight:600; font-size:13px}
        .imdb-badge {background:#F5C518; color:#000; padding:3px 8px; border-radius:3px; font-weight:700; font-size:13px}
        .details-buttons {display:flex; gap:12px; margin-bottom:24px}
        .btn-play {background:#fff; color:#000; border:none; padding:12px 32px; font-size:18px; border-radius:4px; cursor:pointer; font-weight:700; display:flex; align-items:center; gap:10px; transition:0.2s}
        .btn-play:hover {background:rgba(255,255,255,0.75)}
        .btn-trailer {background:rgba(109,109,110,0.7); color:#fff; border:none; padding:12px 32px; font-size:18px; border-radius:4px; cursor:pointer; font-weight:700; display:flex; align-items:center; gap:10px}
        .btn-trailer:hover {background:rgba(109,109,110,0.5)}
        .details-desc {font-size:16px; line-height:1.6; color:#d2d2d2; max-width:800px; margin-bottom:20px}
        .details-info {font-size:14px; color:#808080; margin-bottom:6px}
        .details-info strong {color:#fff; font-weight:600}
        
        .details-section {padding:48px 4%}
        .section-heading {font-size:22px; font-weight:700; margin-bottom:20px}
        .cast-scroll {display:flex; gap:24px; overflow-x:auto; padding-bottom:10px}
        .cast-scroll::-webkit-scrollbar {height:8px}
        .cast-scroll::-webkit-scrollbar-thumb {background:#333; border-radius:4px}
        .cast-member {text-align:center; flex-shrink:0; width:140px}
        .cast-avatar {width:140px; height:140px; border-radius:50%; object-fit:cover; margin-bottom:12px; background:#1a1a1a}
        .cast-name {font-size:15px; font-weight:500; color:#fff}
        .cast-character {font-size:13px; color:#808080; margin-top:4px}
        
        .related-scroll {display:flex; gap:8px; overflow-x:auto; padding-bottom:10px}
        .related-card {flex-shrink:0; width:180px; cursor:pointer; transition:transform 0.3s}
        .related-card:hover {transform:scale(1.05)}
        .related-poster {width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:4px}
        .related-title {font-size:14px; margin-top:8px; color:#e5e5e5}
        .related-year {font-size:12px; color:#808080}

        /* 3RD PHOTO - EPISODES PAGE */
        .episodes-page {display:none; min-height:100vh; background:#141414; position:relative}
        .episodes-page.active {display:block}
        .episodes-bg {position:fixed; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; opacity:0.15; filter:blur(30px); z-index:0}
        .episodes-content {position:relative; z-index:1; padding:88px 4% 40px 4%}
        .episodes-header {margin-bottom:32px}
        .episodes-title {font-size:3rem; font-weight:900; margin-bottom:8px}
        .episodes-subtitle {font-size:16px; color:#a3a3a3; margin-bottom:24px}
        .season-dropdown {background:#2f2f2f; border:1px solid #4f4f4f; color:#fff; padding:10px 40px 10px 16px; border-radius:4px; font-size:16px; font-weight:600; cursor:pointer; appearance:none; background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='white' stroke-width='2'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 12px center}
        .episodes-list {display:flex; flex-direction:column; gap:16px; margin-top:32px}
        .episode-card {display:flex; gap:16px; background:rgba(42,42,42,0.6); backdrop-filter:blur(10px); padding:16px; border-radius:6px; cursor:pointer; transition:0.2s; border:2px solid transparent}
        .episode-card:hover {background:rgba(60,60,60,0.8); border-color:#404040}
        .episode-thumb {width:200px; height:112px; object-fit:cover; border-radius:4px; flex-shrink:0; background:#1a1a1a; position:relative}
        .episode-num {position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,0.9); padding:4px 8px; border-radius:3px; font-size:12px; font-weight:700}
        .episode-info {flex:1}
        .episode-name {font-size:18px; font-weight:700; margin-bottom:8px; color:#fff}
        .episode-desc {font-size:14px; color:#b3b3b3; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
        .episode-duration {font-size:13px; color:#808080; margin-top:8px}
        .ep-download-btn {background:#E50914; color:#fff; padding:10px 20px; border-radius:4px; border:none; cursor:pointer; font-size:14px; font-weight:700; margin-top:12px; display:inline-flex; align-items:center; gap:6px}
        .ep-download-btn:hover {background:#f40612}

        .back-btn {position:fixed; top:80px; left:4%; z-index:1001; background:rgba(0,0,0,0.7); border:none; color:#fff; width:44px; height:44px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:22px; transition:0.2s}
        .back-btn:hover {background:rgba(0,0,0,0.9); transform:scale(1.1)}

        @media (max-width:768px) {
           .shows-grid {grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px}
           .details-title {font-size:2.2rem}
           .details-hero {height:70vh}
           .episode-card {flex-direction:column}
           .episode-thumb {width:100%; height:200px}
           .cast-avatar {width:100px; height:100px}
           .cast-member {width:100px}
           .filter-bar {padding:12px 4%}
           .episodes-title {font-size:2rem}
        }
    </style>
</head>

        let currentShowId = null;
        let currentSeasonNum = 1;

        function applyFilters() {
            const network = document.getElementById('networkFilter').value;
            const type = document.getElementById('typeFilter').value;
            const genre = document.getElementById('genreFilter').value;
            const year = document.getElementById('yearFilter').value;
            const sort = document.getElementById('sortFilter').value;
            const username = document.getElementById('usernameFilter').value.toLowerCase().trim();

            let filtered = [...allShows];

            if(network!== 'Network') {
                filtered = filtered.filter(show => show.network === network);
            }
            if(type!== 'Type') {
                filtered = filtered.filter(show => show.type === type);
            }
            if(genre!== 'All Genres') {
                filtered = filtered.filter(show => show.genre.includes(genre));
            }
            if(year!== 'All Years') {
                filtered = filtered.filter(show => show.year == year);
            }
            if(username!== '') {
                filtered = filtered.filter(show => show.username && show.username.toLowerCase().includes(username));
            }

            if(sort === 'by Popularity' || sort === 'by Rating') {
                filtered.sort((a,b) => b.rating - a.rating);
            } else if(sort === 'by Year') {
                filtered.sort((a,b) => b.year - a.year);
            }

            renderGrid(filtered);
        }

        function renderGrid(shows = null) {
            if(shows === null) {
                shows = allShows.filter(show => show.genre.includes('Drama'));
            }
            const grid = document.getElementById('showsGrid');
            grid.innerHTML = '';
            
            if(shows.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#808080; padding:40px">No shows found for these filters</p>';
                return;
            }

            shows.forEach(show => {
                const card = document.createElement('div');
                card.className = 'show-card';
                card.onclick = () => showDetailsPage(show.id);
                card.innerHTML = `
                    <div style="position:relative">
                        <img src="${show.poster}" alt="${show.title}" class="show-poster" onerror="this.src='https://via.placeholder.com/400x600/1a1a1a/666?text=No+Image'">
                        <span class="tv-badge">TV</span>
                        ${show.username? `<span class="username-badge">@${show.username}</span>` : ''}
                    </div>
                    <div class="show-title">${show.title}</div>
                    <div class="show-year">${show.year}</div>
                `;
                grid.appendChild(card);
            });
        }

        function showHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('filterBar').style.display = 'flex';
            document.getElementById('detailsPage').classList.remove('active');
            document.getElementById('episodesPage').classList.remove('active');
            window.scrollTo(0,0);
        }

        function showDetailsPage(showId) {
            currentShowId = showId;
            const data = showDetails[showId] || allShows.find(s=>s.id===showId);
            if(!data) return;
            
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('filterBar').style.display = 'none';
            document.getElementById('episodesPage').classList.remove('active');
            document.getElementById('detailsPage').classList.add('active');
            
            document.getElementById('detailsHeroImg').src = data.heroImg || data.poster;
            document.getElementById('detailsTitle').textContent = data.title;
            document.getElementById('detailsMeta').innerHTML = `
                <span class="meta-badge">${data.rating || 'TV-MA'}</span>
                <span>${data.year}</span>
                <span>${data.seasons || 1} season${data.seasons>1?'s':''}</span>
                <span>${data.genres}</span>
                <span class="imdb-badge">IMDb ${data.imdb || '8.0'}</span>
            `;
            document.getElementById('detailsDesc').textContent = data.desc || 'No description available.';
            document.getElementById('detailsWriter').textContent = data.writer || 'TBA';
            document.getElementById('detailsCreator').textContent = data.creator || 'TBA';
            
            const castScroll = document.getElementById('castScroll');
            castScroll.innerHTML = '';
            if(data.cast) {
                data.cast.forEach(actor => {
                    castScroll.innerHTML += `
                        <div class="cast-member">
                            <img src="${actor.img}" class="cast-avatar" onerror="this.src='https://via.placeholder.com/200x200/333/999?text=?'">
                            <div class="cast-name">${actor.name}</div>
                            <div class="cast-character">${actor.character}</div>
                        </div>
                    `;
                });
            }
            
            document.getElementById('moreShowsTitle').textContent = `MORE SHOWS WITH ${data.cast?data.cast[0].name.toUpperCase():'ACTOR'}`;
            renderRelated('moreShows', allShows.slice(0,6));
            renderRelated('relatedShows', allShows.slice(6,12));
            window.scrollTo(0,0);
        }

        function renderRelated(containerId, shows) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            shows.forEach(show => {
                container.innerHTML += `
                    <div class="related-card" onclick="showDetailsPage('${show.id}')">
                        <img src="${show.poster}" class="related-poster" onerror="this.src='https://via.placeholder.com/400x600/1a1a1a/666?text=?'">
                        <div class="related-title">${show.title}</div>
                        <div class="related-year">${show.year}</div>
                    </div>
                `;
            });
        }

        function showDetails() {
            document.getElementById('episodesPage').classList.remove('active');
            document.getElementById('detailsPage').classList.add('active');
            window.scrollTo(0,0);
        }

        function showEpisodes() {
            const data = showDetails[currentShowId];
            if(!data ||!data.episodes) return;
            
            document.getElementById('detailsPage').classList.remove('active');
            document.getElementById('episodesPage').classList.add('active');
            
            document.getElementById('episodesBg').style.backgroundImage = `url('${data.heroImg || data.poster}')`;
            document.getElementById('episodesTitle').textContent = data.title;
            document.getElementById('episodesSubtitle').textContent = `${data.year} • ${data.seasons} Seasons`;
            
            const seasonDropdown = document.getElementById('seasonDropdown');
            seasonDropdown.innerHTML = '';
            Object.keys(data.episodes).forEach(s => {
                seasonDropdown.innerHTML += `<option value="${s}">Season ${s}</option>`;
            });
            
            currentSeasonNum = 1;
            renderEpisodes();
            window.scrollTo(0,0);
        }

        function changeSeason(season) {
            currentSeasonNum = season;
            renderEpisodes();
        }

        function renderEpisodes() {
            const data = showDetails[currentShowId];
            const episodes = data.episodes[currentSeasonNum];
            const list = document.getElementById('episodesList');
            list.innerHTML = '';
            episodes.forEach(ep => {
                list.innerHTML += `
                    <div class="episode-card">
                        <div style="position:relative">
                            <img src="${ep.thumb}" class="episode-thumb" onerror="this.src='https://via.placeholder.com/320x180/1a1a1a/666?text=Episode'">
                            <span class="episode-num">S${currentSeasonNum}E${ep.num}</span>
                        </div>
                        <div class="episode-info">
                            <div class="episode-name">${ep.title}</div>
                            <div class="episode-desc">${ep.desc}</div>
                            <div class="episode-duration">(${ep.duration})</div>
                            <button class="ep-download-btn" onclick="downloadSRT('${ep.srt}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                                Download SRT
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function downloadSRT(srtFile) {
            if(!srtFile) {
                alert('Subtitle not available yet!');
                return;
            }
            const link = document.createElement('a');
            link.href = srtFile;
            link.download = srtFile.split('/').pop();
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('networkFilter').addEventListener('change', applyFilters);
            document.getElementById('typeFilter').addEventListener('change', applyFilters);
            document.getElementById('genreFilter').addEventListener('change', applyFilters);
            document.getElementById('yearFilter').addEventListener('change', applyFilters);
            document.getElementById('sortFilter').addEventListener('change', applyFilters);
            document.getElementById('usernameFilter').addEventListener('input', applyFilters);
            applyFilters();
        });
    </script>
