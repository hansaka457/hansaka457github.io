<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinemax Elite - Movie Search</title>
<link href="https://fonts.googleapis.com/css2?family=YouTube+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#FF0000;
  --bg:#0f0f0f;
  --bg2:#1a1a1a;
  --bg3:#272727;
  --bg4:#3d3d3d;
  --t1:#ffffff;
  --t2:#aaaaaa;
  --t3:#717171;
  --chip-bg:#272727;
  --chip-active:#ffffff;
  --chip-active-text:#0f0f0f;
}
html,body{
  background:var(--bg);
  color:var(--t1);
  font-family:'Roboto',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  width:100%;
}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:99;
  background:var(--bg);
  display:flex;align-items:center;
  padding:0 16px;height:56px;gap:0;
}
.tb-logo{display:flex;align-items:center;gap:4px;flex:1}
.tb-logo svg{width:34px;height:24px}
.tb-logo-txt{font-size:16px;font-weight:600;letter-spacing:-.2px;color:var(--t1)}
.tb-logo-txt span{color:var(--red)}
.tb-icons{display:flex;align-items:center;gap:8px}
.tb-icon{
  width:40px;height:40px;display:flex;align-items:center;
  justify-content:center;border-radius:50%;cursor:pointer;
  color:var(--t1);transition:background.15s;
}
.tb-icon:hover,.tb-icon:active{background:var(--bg3)}
.tb-icon svg{width:22px;height:22px}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#4285f4,#34a853);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;cursor:pointer;
}

/* SEARCH OVERLAY */
.search-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);
}
.search-overlay.open{display:flex;flex-direction:column}
.search-bar{
  display:flex;align-items:center;height:56px;padding:0 8px;gap:4px;
  border-bottom:1px solid var(--bg3);
}
.search-back{width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t1);border-radius:50%}
.search-back:hover{background:var(--bg3)}
.search-back svg{width:22px;height:22px}
.search-input-wrap{
  flex:1;background:var(--bg2);border-radius:24px;
  display:flex;align-items:center;padding:0 16px;height:40px;gap:10px;
}
.search-input-wrap svg{color:var(--t2);flex-shrink:0;width:18px;height:18px}
.search-input-wrap input{
  background:none;border:none;outline:none;
  color:var(--t1);font-size:15px;font-family:'Roboto',sans-serif;
  flex:1;width:100%;
}
.search-input-wrap input::placeholder{color:var(--t3)}
.search-results{flex:1;overflow-y:auto;padding:8px 0}
.sr-item{
  display:flex;align-items:center;gap:16px;
  padding:10px 16px;cursor:pointer;
}
.sr-item:active{background:var(--bg2)}
.sr-icon{width:44px;height:44px;background:var(--bg3);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.sr-icon img{width:100%;height:100%;object-fit:cover}
.sr-icon svg{color:var(--t2);width:20px;height:20px}
.sr-text{flex:1;min-width:0}
.sr-title{font-size:14px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:12px;color:var(--t3);margin-top:2px}
.sr-go{color:var(--t3)}
.sr-go svg{width:18px;height:18px}

/* HERO SECTION */
.hero-section{position:relative;overflow:hidden}
.hero-bg{
  width:100%;height:280px;object-fit:cover;
  display:block;filter:brightness(.4);
}
.hero-bg-fallback{
  width:100%;height:280px;
  background:linear-gradient(135deg,#1a0505 0%,#050510 50%,#050a05 100%);
}
.hero-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,var(--bg) 100%);
}
.hero-text{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 16px 24px;
}
.hero-eyebrow{
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--red);text-transform:uppercase;margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.hero-eyebrow::before{content:'';width:16px;height:2px;background:var(--red);display:inline-block}
.hero-title{font-size:32px;font-weight:700;line-height:1.1;margin-bottom:8px}
.hero-sub{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lang-dot{width:5px;height:5px;border-radius:50%;background:var(--t3);display:inline-block}

/* MOVIE DETAILS PAGE */
.detail-hero{position:relative;min-height:400px}
.detail-bg{width:100%;height:400px;object-fit:cover;filter:brightness(.3) blur(8px);transform:scale(1.1)}
.detail-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,var(--bg) 90%)}
.detail-content{position:relative;padding:20px 16px;margin-top:-200px}
.detail-poster{
  width:180px;height:270px;border-radius:12px;
  overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.6);
  margin-bottom:20px;background:var(--bg3);
}
.detail-poster img{width:100%;height:100%;object-fit:cover}
.detail-poster-fallback{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:60px;background:var(--bg3);
}
.detail-title{font-size:28px;font-weight:700;margin-bottom:8px}
.detail-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;font-size:13px;color:var(--t2)}
.detail-rating{display:flex;align-items:center;gap:4px;color:#FFD700;font-weight:600}
.detail-rating svg{width:16px;height:16px}
.detail-plot{font-size:14px;line-height:1.7;color:var(--t2);margin-bottom:20px}
.detail-info-grid{display:grid;grid-template-columns:auto 1fr;gap:12px 16px;font-size:13px;margin-bottom:20px}
.detail-label{color:var(--t3);font-weight:600}
.detail-value{color:var(--t1)}
.genre-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.genre-tag{
  padding:6px 14px;background:var(--bg3);border-radius:20px;
  font-size:12px;font-weight:600;color:var(--t1);
}

/* SECTION */
.section{padding:0 8px;margin-top:8px}
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
}
.section-title{font-size:15px;font-weight:700;letter-spacing:-.1px}
.section-all{font-size:12px;color:var(--t2);font-weight:600;text-decoration:none;cursor:pointer;padding:4px 0}

/* GRID */
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:12px;padding:0 16px 16px;
}
.card{
  cursor:pointer;transition:transform.15s;
}
.card:active{transform:scale(.96)}
.card-poster{
  width:100%;aspect-ratio:2/3;border-radius:8px;
  overflow:hidden;background:var(--bg3);margin-bottom:8px;
  position:relative;
}
.card-poster img{width:100%;height:100%;object-fit:cover}
.card-poster-fallback{
  width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:40px;background:var(--bg3);
}
.card-year{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.8);padding:4px 8px;border-radius:4px;
  font-size:11px;font-weight:700;
}
.card-title{
  font-size:13px;font-weight:600;line-height:1.3;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  margin-bottom:2px;
}
.card-meta{font-size:11px;color:var(--t3)}

/* LOADING */
.spinner{
  width:32px;height:32px;border:3px solid var(--bg3);
  border-top-color:var(--red);border-radius:50%;
  animation:spin.8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bnav{
  position:fixed;bottom:0;left:0;
  width:100%;
  background:var(--bg2);border-top:1px solid var(--bg3);
  display:flex;z-index:97;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.bn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 0 10px;cursor:pointer;color:var(--t3);
  text-decoration:none;transition:color.15s;
}
.bn.on{color:var(--t1)}
.bn svg{width:24px;height:24px;margin-bottom:3px}
.bn span{font-size:10px;font-weight:500}

.pb{height:80px}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(4,1fr)}
  .detail-content{display:flex;gap:30px;align-items:flex-start}
  .detail-poster{flex-shrink:0}
  .detail-info{flex:1}
}
@media(min-width:1024px){
  .grid{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-logo">
    <svg viewBox="0 0 34 24" fill="none">
      <rect width="34" height="24" rx="5" fill="#FF0000"/>
      <path d="M13.5 7.5l8 4.5-8 4.5V7.5z" fill="white"/>
    </svg>
    <span class="tb-logo-txt">&nbsp;Cinemax <span>Elite</span></span>
  </div>
  <div class="tb-icons">
    <div class="tb-icon" onclick="openSearch()" title="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35"/></svg>
    </div>
    <div class="avatar">C</div>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <div class="search-back" onclick="closeSearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </div>
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search movies, TV series..." onkeypress="if(event.key==='Enter')handleSearch(this.value)">
    </div>
  </div>
  <div class="search-results" id="searchResults">
    <div style="padding:40px 16px;text-align:center;color:var(--t3);font-size:14px">Search for movies or TV series</div>
  </div>
</div>

<!-- HOME PAGE -->
<div id="page-home">
  <!-- HERO -->
  <div class="hero-section">
    <div class="hero-bg-fallback"></div>
    <div class="hero-gradient"></div>
    <div class="hero-text">
      <div class="hero-eyebrow">Movie Database</div>
      <div class="hero-title">Discover<br>Movies & Series</div>
      <div class="hero-sub">
        <span>OMDb Powered</span>
        <span class="lang-dot"></span>
        <span>HD Posters</span>
        <span class="lang-dot"></span>
        <span>IMDB Ratings</span>
      </div>
    </div>
  </div>

  <!-- TRENDING -->
  <div class="section">
    <div class="section-head">
      <div class="section-title">Trending Now</div>
    </div>
    <div class="grid" id="trendingGrid"></div>
  </div>

  <div class="pb"></div>
</div>

<!-- DETAIL PAGE -->
<div id="page-detail" style="display:none"></div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <div class="bn on" onclick="goHome()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </div>
  <div class="bn" onclick="openSearch()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35"/></svg>
    <span>Search</span>
  </div>
</div>

<script>
// ===== OMDb API Config =====
const OMDB_KEY = '5daa34a1'; // උඹේ API Key

// ===== Trending Movies IMDB IDs =====
const TRENDING_IDS = [
  'tt3896198', // Guardians of the Galaxy Vol. 2
  'tt0111161', // The Shawshank Redemption
  'tt1375666', // Inception
  'tt0816692', // Interstellar
  'tt0468569', // The Dark Knight
  'tt0137523', // Fight Club
  'tt0109830', // Forrest Gump
  'tt0120737', // LOTR Fellowship
  'tt0167260', // LOTR Return of the King
  'tt4154796'  // Avengers Endgame
];

// ===== Fetch OMDb Data =====
async function fetchOMDb(imdbID) {
  try {
    const res = await fetch(`//www.omdbapi.com/?i=${imdbID}&apikey=${OMDB_KEY}&plot=full`);
    const data = await res.json();
    if (data.Response === 'True') return data;
    return null;
  } catch(e) {
    console.error('OMDb Error:', e);
    return null;
  }
}

// ===== Load Trending =====
async function loadTrending() {
  const grid = document.getElementById('trendingGrid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px"><div class="spinner"></div>Loading...</div>';
  
  const promises = TRENDING_IDS.map(id => fetchOMDb(id));
  const movies = await Promise.all(promises);
  
  grid.innerHTML = movies.filter(m => m).map(movie => `
    <div class="card" onclick="showMovieDetail('${movie.imdbID}')">
      <div class="card-poster">
        <img src="${movie.Poster !== 'N/A' ? movie.Poster : ''}" alt="${movie.Title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-poster-fallback" style="display:none">🎬</div>
        <div class="card-year">${movie.Year}</div>
      </div>
      <div class="card-title">${movie.Title}</div>
      <div class="card-meta">⭐ ${movie.imdbRating} · ${movie.Type}</div>
    </div>
  `).join('');
}

// ===== Search =====
async function handleSearch(val){
  const res=document.getElementById('searchResults');
  if(!val.trim()){
    res.innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--t3);font-size:14px">Search for movies or TV series</div>';
    return;
  }
  
  res.innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--t2)"><div class="spinner"></div>Searching...</div>';
  
  try {
    const omdbRes = await fetch(`//www.omdbapi.com/?s=${encodeURIComponent(val)}&apikey=${OMDB_KEY}`);
    const omdbData = await omdbRes.json();
    
    if(omdbData.Response === 'True' && omdbData.Search){
      res.innerHTML = omdbData.Search.slice(0,10).map(m => `
        <div class="sr-item" onclick="showMovieDetail('${m.imdbID}')">
          <div class="sr-icon">
            <img src="${m.Poster !== 'N/A' ? m.Poster : ''}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <svg style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/></svg>
          </div>
          <div class="sr-text">
            <div class="sr-title">${m.Title}</div>
            <div class="sr-sub">${m.Year} · ${m.Type}</div>
          </div>
          <div class="sr-go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
      `).join('');
    } else {
      res.innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--t3);font-size:14px">No results found</div>';
    }
  } catch(e) {
    res.innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--red);font-size:14px">Error: '+e.message+'</div>';
  }
}

// ===== Show Movie Detail =====
async function showMovieDetail(imdbID) {
  closeSearch();
  
  const homePage = document.getElementById('page-home');
  const detailPage = document.getElementById('page-detail');
  
  homePage.style.display = 'none';
  detailPage.style.display = 'block';
  detailPage.innerHTML = '<div style="padding:100px 16px;text-align:center"><div class="spinner"></div>Loading...</div>';
  window.scrollTo(0,0);
  
  const data = await fetchOMDb(imdbID);
  if(!data) {
    detailPage.innerHTML = '<div style="padding:100px 16px;text-align:center;color:var(--red)">Movie not found</div>';
    return;
  }
  
  const poster = data.Poster !== 'N/A' ? data.Poster : '';
  const genres = data.Genre ? data.Genre.split(', ') : [];
  
  detailPage.innerHTML = `
    <div class="detail-hero">
      <img src="${poster}" class="detail-bg" alt="" onerror="this.style.display='none'">
      <div class="detail-gradient"></div>
    </div>
    <div class="detail-content">
      <div class="detail-poster">
        <img src="${poster}" alt="${data.Title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="detail-poster-fallback" style="display:none">🎬</div>
      </div>
      <div class="detail-info">
        <h1 class="detail-title">${data.Title}</h1>
        <div class="detail-meta">
          <span>${data.Year}</span>
          <span class="lang-dot"></span>
          <span>${data.Runtime}</span>
          <span class="lang-dot"></span>
          <span>${data.Rated}</span>
          ${data.imdbRating !== 'N/A' ? `
            <span class="lang-dot"></span>
            <span class="detail-rating">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              ${data.imdbRating}/10
            </span>
          ` : ''}
        </div>
        <p class="detail-plot">${data.Plot}</p>
        <div class="genre-tags">
          ${genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
        </div>
        <div class="detail-info-grid">
          <span class="detail-label">Director</span>
          <span class="detail-value">${data.Director}</span>
          <span class="detail-label">Writer</span>
          <span class="detail-value">${data.Writer}</span>
          <span class="detail-label">Actors</span>
          <span class="detail-value">${data.Actors}</span>
          <span class="detail-label">Language</span>
          <span class="detail-value">${data.Language}</span>
          <span class="detail-label">Country</span>
          <span class="detail-value">${data.Country}</span>
          ${data.Awards !== 'N/A' ? `
            <span class="detail-label">Awards</span>
            <span class="detail-value">${data.Awards}</span>
          ` : ''}
        </div>
      </div>
    <div class="pb"></div>
  `;
}

// ===== Navigation =====
function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--t3);font-size:14px">Search for movies or TV series</div>';
}
function goHome(){
  document.getElementById('page-home').style.display = 'block';
  document.getElementById('page-detail').style.display = 'none';
  window.scrollTo(0,0);
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', loadTrending);
</script>

</body>
        </html>
