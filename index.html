<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CINEMAX English 🔥 – Sinhala Subtitles</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --card:      #1c1c28;
      --border:    #2a2a3a;
      --accent:    #e50914;
      --accent2:   #f5a623;
      --text:      #e8e8f0;
      --muted:     #7a7a99;
      --radius:    10px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      backdrop-filter: blur(4px);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-decoration: none;
    }
    .logo span { color: var(--text); }
    nav a.back-link {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    nav a.back-link:hover { color: var(--text); border-color: var(--accent); }

    /* ── HERO SECTION ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 500px;
      overflow: hidden;
    }
    .hero-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .hero-video.active { opacity: 1; }

    /* fallback gradient when video not loaded */
    .hero-fallback {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a0a1a 0%, #0a0a2e 50%, #1a0505 100%);
    }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.4) 50%,
        rgba(0,0,0,0.1) 100%
      ),
      linear-gradient(to top, rgba(10,10,15,1) 0%, transparent 40%);
    }

    .hero-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; justify-content: flex-end;
      height: 100%;
      padding: 0 40px 80px;
      max-width: 580px;
    }
    .hero-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
      margin-bottom: 14px;
      width: fit-content;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 12px;
      transition: opacity 0.5s;
    }
    .hero-desc {
      font-size: 0.9rem;
      color: rgba(232,232,240,0.75);
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 440px;
      transition: opacity 0.5s;
    }
    .hero-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 6px;
      text-decoration: none;
      width: fit-content;
      transition: background 0.2s, transform 0.15s;
      cursor: pointer;
      border: none;
    }
    .hero-btn:hover { background: #c0070f; transform: translateY(-1px); }

    /* Series dots */
    .hero-dots {
      position: absolute; bottom: 32px; right: 40px; z-index: 3;
      display: flex; gap: 8px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

    /* ── SUBTITLES SECTION ── */
    .section {
      padding: 60px 28px 80px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 36px;
    }
    .section-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 2px;
    }
    .section-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* Series Tabs */
    .series-tabs {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .tab-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 9px 20px;
      border-radius: 30px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 7px;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .tab-btn .dot-ind {
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor; opacity: 0.6;
    }

    /* Season Toggle */
    .season-bar {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .season-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .season-btn.active {
      background: rgba(229,9,20,0.15);
      border-color: var(--accent);
      color: var(--text);
    }

    /* Episode Grid */
    .ep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }
    .ep-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.22s;
      position: relative;
      overflow: hidden;
    }
    .ep-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s;
    }
    .ep-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .ep-card:hover::before { transform: scaleY(1); }
    .ep-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      color: var(--accent);
      min-width: 44px;
      line-height: 1;
    }
    .ep-info { flex: 1; min-width: 0; }
    .ep-label {
      font-size: 0.78rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ep-sub {
      font-size: 0.7rem; color: var(--muted);
      margin-top: 2px;
    }
    .dl-icon {
      font-size: 1.1rem; opacity: 0.5;
      transition: opacity 0.2s;
    }
    .ep-card:hover .dl-icon { opacity: 1; }

    /* Panels */
    .series-panel { display: none; }
    .series-panel.active { display: block; }

    /* ── INFO STRIP ── */
    .info-strip {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 22px 28px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .info-strip strong { color: var(--text); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .hero-content { padding: 0 20px 70px; }
      .hero-dots { right: 20px; }
      .section { padding: 40px 16px 60px; }
      .ep-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">CINE<span>MAX</span> 🔥</a>
  <a href="index.html" class="back-link">← ගෙදර</a>
</nav>

<!-- HERO BANNER - Fan Edit Videos -->
<section class="hero">
  <div class="hero-fallback"></div>

  <video class="hero-video active" id="vid0"
    src="wednesday-edit.mp4"
    muted autoplay playsinline loop preload="auto">
  </video>
  <video class="hero-video" id="vid1"
    src="thewonderfools_sinhala.mp4"
    muted playsinline loop preload="auto">
  </video>
  <video class="hero-video" id="vid2"
    src="from-edit.mp4"
    muted playsinline loop preload="auto">
  </video>

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <span class="hero-badge">Sinhala Subtitles</span>
    <h1 class="hero-title" id="hero-title">Wednesday</h1>
    <p class="hero-desc" id="hero-desc">
      Wednesday Addams ගේ Nevermore Academy ජීවිතය. සිංහල උපසිරසි සමඟ සම්පූර්ණ Season 1 සහ 2 දැන් බා ගන්න.
    </p>
    <button class="hero-btn" id="hero-jump-btn" onclick="jumpToSeries(0)">
      ⬇ Subtitles බා ගන්න
    </button>
  </div>

  <div class="hero-dots">
    <div class="dot active" onclick="switchHero(0)"></div>
    <div class="dot" onclick="switchHero(1)"></div>
    <div class="dot" onclick="switchHero(2)"></div>
  </div>
</section>

<!-- SUBTITLES SECTION -->
<main class="section">
  <div class="section-header">
    <h2>සිංහල උපසිරසි</h2>
    <div class="section-line"></div>
  </div>

  <!-- Series Tabs -->
  <div class="series-tabs">
    <button class="tab-btn active" onclick="showSeries('wednesday', this)">
      <span class="dot-ind"></span> Wednesday
    </button>
    <button class="tab-btn" onclick="showSeries('wonderfools', this)">
      <span class="dot-ind"></span> The Wonderfools
    </button>
    <button class="tab-btn" onclick="showSeries('from', this)">
      <span class="dot-ind"></span> From
    </button>
  </div>

  <!-- ── WEDNESDAY ── -->
  <div class="series-panel active" id="panel-wednesday">
    <div class="season-bar" id="wed-seasons">
      <button class="season-btn active" onclick="showSeason('wed', 1, this)">Season 1</button>
      <button class="season-btn" onclick="showSeason('wed', 2, this)">Season 2</button>
    </div>

    <div class="ep-grid" id="wed-s1">
      <!-- Season 1: Ep 1-8 -->
    </div>
    <div class="ep-grid" id="wed-s2" style="display:none;">
      <!-- Season 2: Ep 1-8 -->
    </div>
  </div>

  <!-- ── THE WONDERFOOLS ── -->
  <div class="series-panel" id="panel-wonderfools">
    <div class="ep-grid" id="wonderfools-eps">
      <!-- Ep 1-8 -->
    </div>
  </div>

  <!-- ── FROM ── -->
  <div class="series-panel" id="panel-from">
    <div class="season-bar" id="from-seasons">
      <button class="season-btn active" onclick="showSeason('from', 1, this)">Season 1</button>
      <button class="season-btn" onclick="showSeason('from', 2, this)">Season 2</button>
      <button class="season-btn" onclick="showSeason('from', 3, this)">Season 3</button>
      <button class="season-btn" onclick="showSeason('from', 4, this)">Season 4</button>
    </div>
    <div class="ep-grid" id="from-s1"></div>
    <div class="ep-grid" id="from-s2" style="display:none;"></div>
    <div class="ep-grid" id="from-s3" style="display:none;"></div>
    <div class="ep-grid" id="from-s4" style="display:none;"></div>
  </div>
</main>

<div class="info-strip">
  සියළු උපසිරසි <strong>සිංහල භාෂාවෙන්</strong> — <strong>CINEMAX</strong> විසින් ❤️
</div>

<script>
  // ─────────────────────────────────────────
  // HERO VIDEO SWITCHER
  // ─────────────────────────────────────────
  const heroData = [
    {
      vid: 'vid0',
      title: 'Wednesday',
      desc: 'Wednesday Addams ගේ Nevermore Academy ජීවිතය. සිංහල උපසිරසි සමඟ සම්පූර්ණ Season 1 සහ 2 දැන් බා ගන්න.',
      series: 0
    },
    {
      vid: 'vid1',
      title: 'The Wonderfools',
      desc: 'ශ්‍රී ලංකාවේ ප්‍රසිද්ධ The Wonderfools ශ්‍රේණිය. සිංහල උපසිරසි සමඟ සියළු කොටස් ලබා ගන්න.',
      series: 1
    },
    {
      vid: 'vid2',
      title: 'From',
      desc: 'රහස්‍යමය නගරයක් තුළ සිරවූ පිරිසක්. Season 1-4 සිංහල උපසිරසි සමඟ.',
      series: 2
    }
  ];

  let currentHero = 0;
  let heroInterval;

  function switchHero(idx) {
    const prev = heroData[currentHero];
    const next = heroData[idx];

    document.getElementById(prev.vid).classList.remove('active');
    document.getElementById(next.vid).classList.add('active');

    // If vid not playing, play it
    const vidEl = document.getElementById(next.vid);
    if (vidEl.paused) vidEl.play().catch(() => {});

    document.getElementById('hero-title').textContent = next.title;
    document.getElementById('hero-desc').textContent = next.desc;
    document.getElementById('hero-jump-btn').onclick = () => jumpToSeries(next.series);

    document.querySelectorAll('.hero-dots .dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });

    currentHero = idx;
  }

  function jumpToSeries(idx) {
    const tabs = document.querySelectorAll('.tab-btn');
    const seriesNames = ['wednesday', 'wonderfools', 'from'];
    showSeries(seriesNames[idx], tabs[idx]);
    document.querySelector('.section').scrollIntoView({ behavior: 'smooth' });
  }

  function startHeroAutoplay() {
    heroInterval = setInterval(() => {
      switchHero((currentHero + 1) % 3);
    }, 7000);
  }

  document.querySelectorAll('.dot').forEach(d => {
    d.addEventListener('click', () => {
      clearInterval(heroInterval);
      startHeroAutoplay();
    });
  });

  startHeroAutoplay();

  // Mute-safe play
  document.getElementById('vid0').play().catch(() => {});

  // ─────────────────────────────────────────
  // SERIES PANEL SWITCHER
  // ─────────────────────────────────────────
  function showSeries(name, btn) {
    document.querySelectorAll('.series-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ─────────────────────────────────────────
  // SEASON SWITCHER
  // ─────────────────────────────────────────
  function showSeason(prefix, num, btn) {
    const panel = document.getElementById('panel-' + (prefix === 'wed' ? 'wednesday' : 'from'));
    panel.querySelectorAll('.ep-grid').forEach(g => g.style.display = 'none');
    document.getElementById(prefix + '-s' + num).style.display = 'grid';
    panel.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ─────────────────────────────────────────
  // BUILD EPISODE CARDS
  // ─────────────────────────────────────────
  const BASE = 'https://raw.githubusercontent.com/hansaka457/hansaka457github.io/main/data/';

  function epCard(filename, label, episodeNum) {
    const url = BASE + filename;
    return `
      <a class="ep-card" href="${url}" download="${filename}">
        <div class="ep-num">${String(episodeNum).padStart(2,'0')}</div>
        <div class="ep-info">
          <div class="ep-label">${label}</div>
          <div class="ep-sub">SRT · සිංහල</div>
        </div>
        <div class="dl-icon">⬇</div>
      </a>`;
  }

  // ── WEDNESDAY S1 (ep 1-8) ──
  const wedS1 = document.getElementById('wed-s1');
  for (let i = 1; i <= 8; i++) {
    wedS1.innerHTML += epCard(`wednesday_1-${i}_sinhala.srt`, `Episode ${i}`, i);
  }

  // ── WEDNESDAY S2 (ep 1-8) ──
  const wedS2 = document.getElementById('wed-s2');
  for (let i = 1; i <= 8; i++) {
    wedS2.innerHTML += epCard(`wednesday_2-${i}_sinhala.srt`, `Episode ${i}`, i);
  }

  // ── THE WONDERFOOLS (ep 1-8) ──
  const wfEps = document.getElementById('wonderfools-eps');
  for (let i = 1; i <= 8; i++) {
    wfEps.innerHTML += epCard(`thewonderfools_1-${i}_sinhala.srt`, `Episode ${i}`, i);
  }

  // ── FROM seasons ──
  // S1: ep 1-1 to 1-10 (from screenshots: from_1-1 to from_1-10 + from_1-5 etc)
  const fromCounts = { 1: 10, 2: 10, 3: 9, 4: 3 };

  for (const [s, count] of Object.entries(fromCounts)) {
    const grid = document.getElementById('from-s' + s);
    for (let i = 1; i <= count; i++) {
      // from uses format: from_S-E_sinhala.srt
      const fn = s == 4 && i <= 3
        ? (i <= 2 ? `from_4-${i}_sinhala-1.srt` : `from_4-3_sinhala.srt`)
        : `from_${s}-${i}_sinhala.srt`;
      grid.innerHTML += epCard(fn, `Episode ${i}`, i);
    }
  }
</script>
</body>
</html>
