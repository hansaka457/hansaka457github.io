<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEMAX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Roboto,sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:65px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:100;
}

.logo{
font-size:28px;
font-weight:900;
color:#E50914;
}

.header-icons{
display:flex;
gap:20px;
font-size:24px;
}

.search-box{
margin-top:80px;
padding:15px;
}

.search-box input{
width:100%;
padding:14px;
background:#1c1c1c;
border:none;
border-radius:10px;
color:white;
font-size:15px;
}

.section-title{
padding:15px;
font-size:20px;
font-weight:bold;
}

.poster-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:15px;
}

.poster-card{
text-decoration:none;
color:white;
}

.poster-wrapper{
position:relative;
}

.poster{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

.tv-badge{
position:absolute;
top:6px;
right:6px;
background:#6c5ce7;
padding:3px 8px;
border-radius:20px;
font-size:10px;
font-weight:bold;
}

.poster-info{
padding-top:6px;
text-align:center;
}

.poster-title{
font-size:13px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.poster-year{
font-size:12px;
color:#aaa;
}

@media(max-width:768px){

.poster-grid{
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.poster{
height:180px;
}

.poster-title{
font-size:12px;
}

}

</style>
</head>
<body>

<div class="header">

<div class="logo">CINEMAX</div>
