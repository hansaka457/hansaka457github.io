<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFlix - TV Series</title>
  <style>
    body { background:#141414; color:white; font-family:'Segoe UI'; margin:0; }
    header { padding:20px 40px; background:#000; display:flex; justify-content:space-between; align-items:center; position:fixed; width:100%; z-index:100; }
    .logo { color:#E50914; font-size:32px; font-weight:bold; }

    .row-title { padding: 60px 40px 10px; font-size:24px; }
    .row { display:flex; overflow-x:auto; gap:15px; padding:0 40px 30px; }
    .poster { width:210px; border-radius:10px; cursor:pointer; transition:0.3s; }
    .poster:hover { transform:scale(1.12); }

    /* Modal */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; overflow-y:auto; }
    .modal-content { max-width:1100px; margin:40px auto; background:#1f1f1f; border-radius:12px; overflow:hidden; }
    .hero-video { position:relative; height:70vh; }
    .hero-video video { width:100%; height:100%; object-fit:cover; }
    .close { position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer; z-index:10; }

    .cast { display:flex; flex-wrap:wrap; gap:25px; padding:30px; }
    .cast-member img { width:130px; height:130px; border-radius:50%; object-fit:cover; border:3px solid #E50914; }
    .subtitle-item { background:#333; padding:15px; margin:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; }
    .download-btn { background:#E50914; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>

<header>
  <div class="logo">MyFlix</div>
</header>

<h2 class="row-title">Popular Series</h2>
<div class="row" id="seriesRow"></div>

<!-- DETAIL MODAL -->
<div class="modal" id="detailModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <div class="hero-video" id="modalHero"></div>
    <div style="padding:30px;" id="modalBody"></div>
  </div>
</div>

<script>
// === All Series Data ===
const seriesData = [
  {
    id: "wonderfools",
    title: "The WONDERfools",
    year: "2026",
    poster: "https://i.imgur.com/wonderfools-poster.jpg",
    video: "thewonderfools_sinhala.mp4",
    description: "A goofy group of townies stumble into superpowers...",
    cast: [
      {name:"Park Eun-bin", role:"Eun Chae-ni", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Park_Eun-bin_in_2022.jpg/800px-Park_Eun-bin_in_2022.jpg"},
      {name:"Cha Eun-woo", role:"Lee Un-jeong", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Cha_Eun-woo_in_2022.jpg/800px-Cha_Eun-woo_in_2022.jpg"}
    ],
    subtitles: ["thewonderfools_1_1_sinhala.srt", "thewonderfools_1_2_sinhala.srt", "thewonderfools_1_3_sinhala.srt"]
  },
  {
    id: "wednesday",
    title: "Wednesday",
    year: "2022",
    poster: "https://i.imgur.com/wednesday-poster.jpg",
    video: "wednesday-edit.mp4",
    description: "Wednesday Addams investigates murders at Nevermore Academy.",
    cast: [
      {name:"Jenna Ortega", role:"Wednesday Addams", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Jenna_Ortega_2024.jpg/800px-Jenna_Ortega_2024.jpg"},
      {name:"Emma Myers", role:"Enid Sinclair", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Emma_Myers_2024.jpg/800px-Emma_Myers_2024.jpg"},
      {name:"Catherine Zeta-Jones", role:"Morticia Addams", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Catherine_Zeta-Jones_2012.jpg/800px-Catherine_Zeta-Jones_2012.jpg"}
    ],
    subtitles: ["wednesday_1_1_sinhala.srt", "wednesday_1_2_sinhala.srt"]
  },
  {
    id: "from",
    title: "From",
    year: "2022",
    poster: "https://i.imgur.com/from-poster.jpg",
    video: "from_sinhala.mp4",  // ඔයාගේ file එක නම දාන්න
    description: "A mysterious town traps its residents who can't leave.",
    cast: [
      {name:"Harold Perrineau", role:"Boyd Stevens", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Harold_Perrineau_2019.jpg/800px-Harold_Perrineau_2019.jpg"},
      {name:"Catalina Sandino Moreno", role:"Tabitha Matthews", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Catalina_Sandino_Moreno_2015.jpg/800px-Catalina_Sandino_Moreno_2015.jpg"},
      {name:"Eion Bailey", role:"Jim Matthews", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Eion_Bailey_2015.jpg/800px-Eion_Bailey_2015.jpg"}
    ],
    subtitles: ["from_1_1_sinhala.srt", "from_1_2_sinhala.srt"]
  }
  // ඔයාට ඕන 50+ series මෙතන add කරන්න
];

function renderSeries() {
  const container = document.getElementById('seriesRow');
  container.innerHTML = '';
  
  seriesData.forEach(show => {
    const div = document.createElement('div');
    div.innerHTML = `<img class="poster" src="\( {show.poster}" onclick="openDetail(' \){show.id}')">`;
    container.appendChild(div);
  });
}

function openDetail(id) {
  const show = seriesData.find(s => s.id === id);
  if (!show) return;

  // Hero Video
  document.getElementById('modalHero').innerHTML = `
    <video autoplay muted loop style="width:100%; height:100%; object-fit:cover;">
      <source src="${show.video}" type="video/mp4">
    </video>
  `;

  // Body Content
  let castHTML = show.cast.map(c => `
    <div class="cast-member" style="text-align:center; width:140px;">
      <img src="${c.img}"><br>
      <strong>\( {c.name}</strong><br><small> \){c.role}</small>
    </div>
  `).join('');

  let subsHTML = show.subtitles.map(file => `
    <div class="subtitle-item">
      📄 ${file}
      <a href="\( {file}" download=" \){file}" class="download-btn">Download</a>
    </div>
  `).join('');

  document.getElementById('modalBody').innerHTML = `
    <h1>\( {show.title} ( \){show.year})</h1>
    <p>${show.description}</p>
    <h2>Cast</h2>
    <div class="cast">${castHTML}</div>
    <h2>Subtitles</h2>
    ${subsHTML}
  `;

  document.getElementById('detailModal').style.display = 'block';
}

function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
}

// Initialize
renderSeries();
</script>

</body>
</html>
