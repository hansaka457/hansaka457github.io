        body,html {margin:0!important; padding:0!important; font-family:'Roboto',Arial,sans-serif; background:#0B0B0B; color:#fff; overflow-x:hidden}
        
       .netflix-header {position:fixed; top:0; width:100%; height:60px; background:#0B0B0B; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:0 4%; border-bottom:1px solid #1a1a1a}
       .netflix-logo {color:#E50914; font-size:28px; font-weight:900; font-family:'Bebas Neue',sans-serif; letter-spacing:2px; cursor:pointer}
       .header-icons {display:flex; gap:20px; align-items:center}
       .header-icons svg {width:22px; height:22px; cursor:pointer; opacity:0.8}
       .header-icons svg:hover {opacity:1}

       .search-input {background:#1E1E1E; border:1px solid #333; color:#fff; padding:10px 15px; border-radius:25px; font-size:14px; font-weight:500; width:200px}
       .search-input::placeholder {color:#666}

       .shows-grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:15px}
       .show-card {cursor:pointer; transition:transform 0.2s; position:relative}
       .show-card:hover {transform:scale(1.05); z-index:10}
       .show-poster {width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:6px; background:#1a1a1a}
       .show-title {font-size:13px; font-weight:500; margin-top:8px; color:#e5e5e5; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
       .show-year {font-size:12px; color:#808080; margin-top:2px}
       .tv-badge {position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); color:#fff; font-size:10px; font-weight:700; padding:3px 6px; border-radius:3px}
       .username-badge {position:absolute; top:8px; left:8px; background:#E50914; color:#fff; font-size:10px; font-weight:700; padding:3px 6px; border-radius:3px}

       .details-page {display:none; min-height:100vh; background:#0B0B0B}
       .details-page.active {display:block}
       .details-hero {position:relative; height:70vh; overflow:hidden}
       .details-hero-img {width:100%; height:100%; object-fit:cover; object-position:center 20%}
       .details-hero-gradient {position:absolute; bottom:0; left:0; right:0; height:60%; background:linear-gradient(to top, #0B0B0B 0%, transparent 100%)}
       .details-hero-content {position:absolute; bottom:0; left:0; right:0; padding:0 4% 40px 4%}
       .details-title {font-size:3rem; font-weight:900; margin-bottom:10px; text-shadow:2px 2px 8px rgba(0,0,0,0.8)}
       .details-meta {display:flex; gap:15px; align-items:center; margin-bottom:15px; font-size:14px; color:#ccc; flex-wrap:wrap}
       .meta-badge {background:#333; padding:2px 8px; border-radius:3px; font-weight:600; font-size:12px}
       .imdb-badge {background:#F5C518; color:#000; padding:2px 6px; border-radius:3px; font-weight:700; font-size:12px}
       .details-buttons {display:flex; gap:12px; margin-bottom:20px}
       .btn-primary {background:#fff; color:#000; border:none; padding:12px 28px; font-size:16px; border-radius:6px; cursor:pointer; font-weight:700; display:flex; align-items:center; gap:8px; transition:0.2s}
       .btn-primary:hover {background:rgba(255,255,0.85)}
       .btn-secondary {background:rgba(109,109,110,0.7); color:#fff; border:none; padding:12px 28px; font-size:16px; border-radius:6px; cursor:pointer; font-weight:700; display:flex; align-items:center; gap:8px}
       .btn-secondary:hover {background:rgba(109,109,110,0.5)}
       .details-desc {font-size:15px; line-height:1.6; color:#d2d2d2; max-width:700px; margin-bottom:25px}
       .details-info {font-size:13px; color:#999; margin-bottom:8px}
       .details-info strong {color:#fff; font-weight:500}
        
       .details-section {padding:40px 4%}
       .section-heading {font-size:20px; font-weight:700; margin-bottom:20px}
       .cast-scroll {display:flex; gap:20px; overflow-x:auto; padding-bottom:10px}
       .cast-scroll::-webkit-scrollbar {height:6px}
       .cast-scroll::-webkit-scrollbar-thumb {background:#333; border-radius:3px}
       .cast-member {text-align:center; flex-shrink:0}
       .cast-avatar {width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:10px; background:#1a1a1a}
       .cast-name {font-size:14px; font-weight:500; color:#fff}
       .cast-character {font-size:12px; color:#808080; margin-top:2px}
        
       .related-scroll {display:flex; gap:15px; overflow-x:auto; padding-bottom:10px}
       .related-card {flex-shrink:0; width:160px; cursor:pointer}
       .related-card:hover {transform:scale(1.05)}
       .related-poster {width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:6px}
       .related-title {font-size:13px; margin-top:8px; color:#e5e5e5}
       .related-year {font-size:12px; color:#808080}

       .episodes-page {display:none; min-height:100vh; background:#0B0B0B; position:relative}
       .episodes-page.active {display:block}
       .episodes-bg {position:fixed; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; opacity:0.15; filter:blur(20px); z-index:0}
       .episodes-content {position:relative; z-index:1; padding:80px 4% 40px 4%}
       .episodes-header {margin-bottom:25px}
       .episodes-title {font-size:2.5rem; font-weight:900; margin-bottom:5px}
       .episodes-subtitle {font-size:14px; color:#999; margin-bottom:20px}
       .season-dropdown {background:#1E1E1E; border:1px solid #333; color:#fff; padding:10px 35px 10px 15px; border-radius:25px; font-size:14px; font-weight:500; cursor:pointer; appearance:none; background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='white' stroke-width='2'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 12px center}
       .episodes-list {display:flex; flex-direction:column; gap:15px; margin-top:30px}
       .episode-card {display:flex; gap:15px; background:rgba(30,30,30,0.6); backdrop-filter:blur(10px); padding:15px; border-radius:8px; cursor:pointer; transition:0.2s}
       .episode-card:hover {background:rgba(40,40,40,0.8)}
       .episode-thumb {width:160px; height:90px; object-fit:cover; border-radius:6px; flex-shrink:0; background:#1a1a1a; position:relative}
       .episode-num {position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,0.8); padding:2px 6px; border-radius:3px; font-size:11px; font-weight:700}

       .episode-name {font-size:16px; font-weight:700; margin-bottom:8px; color:#fff}
       .episode-desc {font-size:13px; color:#b3b3b3; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}

           .filter-select, .search-input {font-size:13px; padding:8px 30px 8px 12px}
           .search-input {width:100%}

    </style>
</head>

        let currentShowId = null;
        let currentSeasonNum = 1;

        function applyFilters() {
            const network = document.getElementById('networkFilter').value;
            const type = document.getElementById('typeFilter').value;
            const genre = document.getElementById('genreFilter').value;
            const year = document.getElementById('yearFilter').value;
            const sort = document.getElementById('sortFilter').value;
            const username = document.getElementById('usernameFilter').value.toLowerCase().trim();

            let filtered = [...allShows];

            if(network!== 'Network') {
                filtered = filtered.filter(show => show.network === network);
            }
            if(type!== 'Type') {
                filtered = filtered.filter(show => show.type === type);
            }
            if(genre!== 'All Genres') {
                filtered = filtered.filter(show => show.genre.includes(genre));
            }
            if(year!== 'All Years') {
                filtered = filtered.filter(show => show.year == year);
            }
            if(username!== '') {
                filtered = filtered.filter(show => show.username && show.username.toLowerCase().includes(username));
            }

            if(sort === 'by Popularity' || sort === 'by Rating') {
                filtered.sort((a,b) => b.rating - a.rating);
            } else if(sort === 'by Year') {
                filtered.sort((a,b) => b.year - a.year);
            }

            renderGrid(filtered);
        }

        function renderGrid(shows = null) {
            if(shows === null) {
                shows = allShows.filter(show => show.genre.includes('Drama'));
            }
            const grid = document.getElementById('showsGrid');
            grid.innerHTML = '';
            
            if(shows.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#808080; padding:40px">No shows found for these filters</p>';
                return;
            }

            shows.forEach(show => {
                const card = document.createElement('div');
                card.className = 'show-card';
                card.onclick = () => showDetailsPage(show.id);
                card.innerHTML = `
                    <div style="position:relative">
                        <img src="${show.poster}" alt="${show.title}" class="show-poster" onerror="this.src='https://via.placeholder.com/400x600/1a1a1a/666?text=No+Image'">
                        <span class="tv-badge">TV</span>
                        ${show.username? `<span class="username-badge">@${show.username}</span>` : ''}
                    </div>
                    <div class="show-title">${show.title}</div>
                    <div class="show-year">${show.year}</div>
                `;
                grid.appendChild(card);
            });
        }

        function showHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('filterBar').style.display = 'flex';
            document.getElementById('detailsPage').classList.remove('active');
            document.getElementById('episodesPage').classList.remove('active');
            window.scrollTo(0,0);
        }

        function showDetailsPage(showId) {
            currentShowId = showId;
            const data = showDetails[showId] || allShows.find(s=>s.id===showId);
            if(!data) return;
            
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('filterBar').style.display = 'none';
            document.getElementById('episodesPage').classList.remove('active');
            document.getElementById('detailsPage').classList.add('active');
            
            document.getElementById('detailsHeroImg').src = data.heroImg || data.poster;
            document.getElementById('detailsTitle').textContent = data.title;
            document.getElementById('detailsMeta').innerHTML = `
                <span class="meta-badge">${data.rating || 'TV-MA'}</span>
                <span>${data.year}</span>
                <span>${data.seasons || 1} season${data.seasons>1?'s':''}</span>
                <span>${data.genres}</span>
                <span class="imdb-badge">IMDb ${data.imdb || '8.0'}</span>
            `;
            document.getElementById('detailsDesc').textContent = data.desc || 'No description available.';
            document.getElementById('detailsWriter').textContent = data.writer || 'TBA';
            document.getElementById('detailsCreator').textContent = data.creator || 'TBA';
            
            const castScroll = document.getElementById('castScroll');
            castScroll.innerHTML = '';
            if(data.cast) {
                data.cast.forEach(actor => {
                    castScroll.innerHTML += `
                        <div class="cast-member">
                            <img src="${actor.img}" class="cast-avatar" onerror="this.src='https://via.placeholder.com/200x200/333/999?text=?'">
                            <div class="cast-name">${actor.name}</div>
                            <div class="cast-character">${actor.character}</div>
                        </div>
                    `;
                });
            }
            
            document.getElementById('moreShowsTitle').textContent = `MORE SHOWS WITH ${data.cast?data.cast[0].name.toUpperCase():'ACTOR'}`;
            renderRelated('moreShows', allShows.slice(0,6));
            renderRelated('relatedShows', allShows.slice(6,12));
            window.scrollTo(0,0);
        }

        function renderRelated(containerId, shows) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            shows.forEach(show => {
                container.innerHTML += `
                    <div class="related-card" onclick="showDetailsPage('${show.id}')">
                        <img src="${show.poster}" class="related-poster" onerror="this.src='https://via.placeholder.com/400x600/1a1a1a/666?text=?'">
                        <div class="related-title">${show.title}</div>
                        <div class="related-year">${show.year}</div>
                    </div>
                `;
            });
        }

        function showDetails() {
            document.getElementById('episodesPage').classList.remove('active');
            document.getElementById('detailsPage').classList.add('active');
            window.scrollTo(0,0);
        }

        function showEpisodes() {
            const data = showDetails[currentShowId];
            if(!data ||!data.episodes) return;
            
            document.getElementById('detailsPage').classList.remove('active');
            document.getElementById('episodesPage').classList.add('active');
            
            document.getElementById('episodesBg').style.backgroundImage = `url('${data.heroImg || data.poster}')`;
            document.getElementById('episodesTitle').textContent = data.title;
            document.getElementById('episodesSubtitle').textContent = `${data.year} • ${data.seasons} Seasons`;
            
            const seasonDropdown = document.getElementById('seasonDropdown');
            seasonDropdown.innerHTML = '';
            Object.keys(data.episodes).forEach(s => {
                seasonDropdown.innerHTML += `<option value="${s}">Season ${s}</option>`;
            });
            
            currentSeasonNum = 1;
            renderEpisodes();
            window.scrollTo(0,0);
        }

        function changeSeason(season) {
            currentSeasonNum = season;
            renderEpisodes();
        }

        function renderEpisodes() {
            const data = showDetails[currentShowId];
            const episodes = data.episodes[currentSeasonNum];
            const list = document.getElementById('episodesList');
            list.innerHTML = '';
            episodes.forEach(ep => {
                list.innerHTML += `
                    <div class="episode-card">
                        <div style="position:relative">
                            <img src="${ep.thumb}" class="episode-thumb" onerror="this.src='https://via.placeholder.com/320x180/1a1a1a/666?text=Episode'">
                            <span class="episode-num">S${currentSeasonNum}E${ep.num}</span>
                        </div>
                        <div class="episode-info">
                            <div class="episode-name">${ep.title}</div>
                            <div class="episode-desc">${ep.desc}</div>
                            <div class="episode-duration">(${ep.duration})</div>
                            <button class="ep-download-btn" onclick="downloadSRT('${ep.srt}')">⬇️ Download SRT</button>
                        </div>
                    </div>
                `;
            });
        }

        function downloadSRT(srtFile) {
            if(!srtFile) {
                alert('Subtitle not available yet!');
                return;
            }
            const link = document.createElement('a');
            link.href = srtFile;
            link.download = srtFile.split('/').pop();
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('networkFilter').addEventListener('change', applyFilters);
            document.getElementById('typeFilter').addEventListener('change', applyFilters);
            document.getElementById('genreFilter').addEventListener('change', applyFilters);
            document.getElementById('yearFilter').addEventListener('change', applyFilters);
            document.getElementById('sortFilter').addEventListener('change', applyFilters);
            document.getElementById('usernameFilter').addEventListener('input', applyFilters);
            applyFilters();
        });
    </script>
