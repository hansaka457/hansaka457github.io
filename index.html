<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CINEMAX 🔥 – Multi Downloader Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1c1c28;
      --border: #2a2a3a;
      --accent: #e50914;
      --text: #e8e8f0;
      --muted: #7a7a99;
      --radius: 10px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
      backdrop-filter: blur(8px);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-decoration: none;
    }
    .logo span { color: var(--text); }

    /* ── HERO SECTION ── */
    .hero {
      position: relative;
      width: 100%;
      height: 40svh;
      min-height: 300px;
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #1a0a1a 0%, #0a0a2e 50%, #1a0505 100%);
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.1) 100%),
                  linear-gradient(to top, rgba(10,10,15,1) 0%, transparent 60%);
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 0 40px;
      max-width: 650px;
    }
    .hero-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
      margin-bottom: 14px;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* ── DOWNLOAD BOX ── */
    .dl-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      max-width: 800px;
      margin: -50px auto 40px;
      position: relative;
      z-index: 10;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }
    .dl-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dl-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      overflow-x: auto;
      padding-bottom: 5px;
    }
    .tab-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .dl-form {
      display: flex;
      gap: 10px;
    }
    .dl-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 6px;
      color: var(--text);
      outline: none;
      font-size: 0.95rem;
    }
    .dl-form input:focus {
      border-color: var(--accent);
    }
    .dl-form button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0 24px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .dl-form button:hover {
      background: #cc0000;
    }
    .result-box {
      margin-top: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    /* ── DOWNLOAD LINKS GRID ── */
    .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; margin-top: 15px; }
    .dl-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
      color: var(--text); text-decoration: none; font-size: 0.85rem; transition: all 0.2s;
    }
    .dl-btn:hover { border-color: var(--accent); background: rgba(229,9,20,0.05); }
    .dl-btn span { font-weight: 600; }

    .info-strip { background: var(--surface); border-top: 1px solid var(--border); padding: 22px 28px; text-align: center; font-size: 0.78rem; color: var(--muted); margin-top: 60px; }
    .info-strip strong { color: var(--text); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      nav { padding: 14px; justify-content: center; }
      .hero { height: auto; padding: 100px 20px 40px; }
      .dl-section { margin: 20px; padding: 20px; }
      .dl-form { flex-direction: column; }
      .dl-form button { padding: 12px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="#" class="logo" onclick="window.location.reload()">CINE<span>MAX</span> 🔥</a>
</nav>

<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="hero-badge">Bot Active APIs</span>
    <h1 class="hero-title">Multi Downloader Portal</h1>
  </div>
</section>

<section class="dl-section">
  <div class="dl-title">
    <span>📥</span> <span id="portal-title">YouTube Downloader</span>
  </div>
  
  <div class="dl-tabs">
    <button class="tab-btn active" onclick="switchService('youtube', 'YouTube Downloader', 'මෙතනට YouTube Link එක ඇතුළත් කරන්න...')">YouTube</button>
    <button class="tab-btn" onclick="switchService('tiktok', 'TikTok Downloader', 'මෙතනට TikTok Link එක ඇතුළත් කරන්න...')">TikTok</button>
    <button class="tab-btn" onclick="switchService('facebook', 'Facebook Downloader', 'මෙතනට Facebook Link එක ඇතුළත් කරන්න...')">Facebook</button>
    <button class="tab-btn" onclick="switchService('instagram', 'Instagram Downloader', 'මෙතනට Instagram Link එක ඇතුළත් කරන්න...')">Instagram</button>
    <button class="tab-btn" onclick="switchService('gdrive', 'Google Drive Downloader', 'මෙතනට Google Drive Link එක ඇතුළත් කරන්න...')">Google Drive</button>
    <button class="tab-btn" onclick="switchService('mega', 'Mega.nz Downloader', 'මෙතනට Mega.nz Link එක ඇතුළත් කරන්න...')">Mega.nz</button>
  </div>

  <div class="dl-form">
    <input type="text" id="dl-url" placeholder="මෙතනට YouTube Link එක ඇතුළත් කරන්න...">
    <button onclick="processDownload()">Get Links</button>
  </div>
  
  <div class="result-box" id="result-display"></div>
</section>

<div class="info-strip">
  සියලුම සේවාවන් Live Bot API පද්ධති මඟින් ස්වයංක්‍රීයව ක්‍රියාත්මක වේ — <strong>CINEMAX</strong>
</div>

<script>
  // දැනට තෝරාගෙන ඇති සේවාව ගබඩා කිරීමට
  let currentService = 'youtube';

  // ටැබ් ක්ලික් කිරීමේදී පෝටල් එක වෙනස් කරන ශ්‍රිතය (Function)
  function switchService(service, title, placeholder) {
    currentService = service;
    document.getElementById('portal-title').textContent = title;
    document.getElementById('dl-url').placeholder = placeholder;
    document.getElementById('dl-url').value = '';
    document.getElementById('result-display').style.display = 'none';
    
    // බටන් වල Active ක්ලාස් එක මාරු කිරීම
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');
  }

  // සියලුම ඩවුන්ලෝඩ් වැඩකටයුතු මෙහෙයවන ප්‍රධාන ශ්‍රිතය
  async function processDownload() {
    const inputUrl = document.getElementById('dl-url').value.trim();
    const resultBox = document.getElementById('result-display');
    
    if (!inputUrl) return alert("කරුණාකර නිවැරදි ලින්ක් එකක් ඇතුළත් කරන්න!");
    
    resultBox.style.display = "block";
    resultBox.innerHTML = `<div style="color: var(--muted); font-size:0.9rem;">සකසමින් පවතී, මොහොතක් රැඳී සිටින්න...</div>`;
    
    try {
      let dlLink = "";
      let title = "Download File";
      let extraLinks = ""; // එකකට වඩා වැඩි ලින්ක්ස් පෙන්වීමට

      // 1. YOUTUBE DOWNLOAD SYSTEM
      if (currentService === 'youtube') {
        const res = await fetch(`https://sulamd-ytmp3.vercel.app/download?q=${encodeURIComponent(inputUrl)}&format=mp3&apikey=SULA0310`);
        const data = await res.json();
        dlLink = data?.result?.download;
        title = "Audio MP3 (High Quality)";
        
        // වීඩියෝ ලින්ක්ස් සඳහා වෙනත් API එකක් භාවිතය (360p සහ 720p)
        extraLinks = `
          <a href="https://tharuzz-ofc-api-v3.vercel.app/api/ytdl/yt?url=${encodeURIComponent(inputUrl)}&format=720" class="dl-btn" target="_blank" style="border-color:#ff0000;">
            <span>📽️ Video (720p HD)</span><span>⬇</span>
          </a>
          <a href="https://tharuzz-ofc-api-v3.vercel.app/api/ytdl/yt?url=${encodeURIComponent(inputUrl)}&format=360" class="dl-btn" target="_blank" style="border-color:#ff0000;">
            <span>📽️ Video (360p SD)</span><span>⬇</span>
          </a>
        `;
      }
      
      // 2. TIKTOK DOWNLOAD SYSTEM
      else if (currentService === 'tiktok') {
        const res = await fetch(`https://darksadasyt-tiktokdl.vercel.app/api/tiktok?q=${encodeURIComponent(inputUrl)}`);
        const data = await res.json();
        dlLink = data.no_watermark;
        title = "Video No Watermark";
        if (data.watermark) {
          extraLinks += `<a href="${data.watermark}" class="dl-btn" target="_blank"><span>🎥 Video With Watermark</span><span>⬇</span></a>`;
        }
        if (data.music) {
          extraLinks += `<a href="${data.music}" class="dl-btn" target="_blank"><span>🎵 TikTok Audio MP3</span><span>⬇</span></a>`;
        }
      }
      
      // 3. FACEBOOK DOWNLOAD SYSTEM
      else if (currentService === 'facebook') {
        const res = await fetch(`https://apis.prexzyvilla.site/download/facebook?url=${encodeURIComponent(inputUrl)}`);
        const sadas = await res.json();
        if(sadas.status && sadas.data) {
          dlLink = sadas.data.hd || sadas.data.sd;
          title = sadas.data.hd ? "Video HD Quality" : "Video SD Quality";
          if (sadas.data.hd && sadas.data.sd) {
            extraLinks += `<a href="${sadas.data.sd}" class="dl-btn" target="_blank"><span>🎥 Video SD Quality</span><span>⬇</span></a>`;
          }
        }
      }
      
      // 4. INSTAGRAM DOWNLOAD SYSTEM
      else if (currentService === 'instagram') {
        const res = await fetch(`https://sadaslk-apis.vercel.app/api/v1/download/inster?q=${encodeURIComponent(inputUrl)}&apiKey=sadasggggg`);
        const data = await res.json();
        if(data.status && data.data && data.data.links) {
          dlLink = data.data.links[0];
          title = "Instagram Video / Reel";
        }
      }
      
      // 5. GOOGLE DRIVE DOWNLOAD SYSTEM
      else if (currentService === 'gdrive') {
        // බෝට් එකේ පවතින api-dylux ශ්‍රිතය සෘජුවම වෙබ් එකට හරවා ඇත
        alert("Google Drive සේවාව පසුබිමෙන් ක්‍රියාත්මක වේ. සෘජු බාගත කිරීම් සඳහා API දත්ත සකසමින් පවතී.");
        resultBox.innerHTML = `<div style="color: var(--muted); font-size:0.9rem;">Google Drive සෘජු සබැඳි වෙබ් අඩවියෙන් බාගත කිරීමට සීමාවන් පැවතිය හැක. බෝට් එක භාවිත කරන්න.</div>`;
        return;
      }
      
      // 6. MEGA.NZ DOWNLOAD SYSTEM
      else if (currentService === 'mega') {
        const res = await fetch(`https://sadaslk-fast-mega-dl.vercel.app/mega?q=${encodeURIComponent(inputUrl)}`);
        const data = await res.json();
        if(data.status && data.result) {
          dlLink = data.result.download;
          title = data.result.name || "Mega Document File";
        }
      }

      // UI එක මත ලින්ක්ස් නිවැරදිව පෙන්වීම
      if (dlLink) {
        resultBox.innerHTML = `
          <div class="links-grid">
            <a href="${dlLink}" class="dl-btn" target="_blank" style="border-color: var(--accent);">
              <span>📥 ${title}</span>
              <span>⬇</span>
            </a>
            ${extraLinks}
          </div>
        `;
      } else if (!extraLinks) {
        resultBox.innerHTML = `<div style="color: var(--accent); font-size:0.9rem;">බාගත කිරීමේ ලින්ක් එක ලබා ගැනීමට නොහැකි විය. කරුණාකර ලින්ක් එක නිවැරදිදැයි බලන්න.</div>`;
      } else {
        resultBox.innerHTML = `<div class="links-grid">${extraLinks}</div>`;
      }

    } catch (error) {
      console.error(error);
      resultBox.innerHTML = `<div style="color: var(--accent); font-size:0.9rem;">දෝෂයක් සිදු විය! කරුණාකර පසුව උත්සාහ කරන්න.</div>`;
    }
  }
</script>
</body>
</html>
