<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Film AI Assistant - Cinemax Elite</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent}
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
        }
     .chat-container {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        /* Background Image */
     .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://www.google.com/imgres?imgurl=https%3A%2F%2Fwallpapercave.com%2Fwp%2Fwp8894729.jpg&tbnid=qFc86jEds74XHM&vet=1&imgrefurl=https%3A%2F%2Fwallpapercave.com%2Fgirl-anime-phone-wallpapers&docid=nJqRV9BNlH5I_M&w=1200&h=1920&hl=en-US&source=sh%2Fx%2Fim%2Fm6%2F4&kgs=4d21c2d249af2e4c&shem=epsd1%2Cnisbtsac%2Crimspwouoe');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: 0;
        }
     .chat-header {
            background: rgba(229, 9, 20, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            text-align: center;
            font-weight: 900;
            font-size: 1.2em;
            letter-spacing: -0.5px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 2;
            position: relative;
        }
     .chat-box {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
            z-index: 1;
            position: relative;
        }
     .chat-box::-webkit-scrollbar {
            width: 5px;
        }
     .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }
     .msg {
            padding: 12px 14px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 15px;
            animation: fadeIn 0.2s ease-in;
            white-space: pre-wrap;
            backdrop-filter: blur(8px);
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(5px);}
            to {opacity: 1; transform: translateY(0);}
        }
     .user-msg {
            background: rgba(0, 120, 255, 0.9);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
     .ai-msg {
            background: rgba(39, 39, 39, 0.9);
            align-self: flex-start;
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
      .msg img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
        }
     .input-area {
            display: flex;
            padding: 12px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            z-index: 2;
            position: relative;
        }
      .input-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            background: rgba(39, 39, 39, 0.9);
            border-radius: 24px;
            padding: 0 4px 0 16px;
            border: 1px solid rgba(255,255,255,0.15);
        }
      .input-left:focus-within {
            border-color: #E50914;
        }
     .input-area input[type="text"] {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: none;
            color: white;
            font-size: 16px;
            outline: none;
        }
     .input-area input::placeholder {
            color: #999;
        }
      .img-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
      .img-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
      .img-btn svg {
            width: 22px;
            height: 22px;
        }
     .input-area button.send {
            background: #E50914;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: opacity 0.15s;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(229, 9, 20, 0.4);
        }
     .input-area button.send:hover {
            opacity: 0.85;
        }
     .input-area button.send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
     .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
     .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
     .typing span:nth-child(2) { animation-delay: 0.2s; }
     .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        #imageInput {
            display: none;
        }
      .preview-img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🎬 Film AI Assistant</div>
    <div class="chat-box" id="chatBox">
        <div class="msg ai-msg">හලෝ! මම Cinemax Elite එකේ Film AI එක 🎬<br><br>📷 Series එකක photo එකක් upload කරලා ඒ ගැන විස්තර අහන්න.<br>💬 නැත්නම් බලන්න හොඳ Films, TV Series ගැන මගෙන් අහන්න.<br><br>මොකක්ද දැනගන්න ඕන? 😊</div>
    </div>
    <div class="input-area">
        <div class="input-left">
            <input type="text" id="userInput" placeholder="Message or upload photo...">
            <button class="img-btn" onclick="document.getElementById('imageInput').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
        </div>
        <button class="send" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const chatBox = document.getElementById("chatBox");
const inputField = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
let selectedImage = null;

let chatHistory = [
    {role: "system", content: "You are Film AI Assistant for Cinemax Elite website. You are a friendly movie and TV series expert. If user uploads an image, identify the movie/series and give details like plot, rating, main cast, and where to watch. Help users find movies, explain plots, suggest based on mood/genre/actors. Always reply in Sinhala if the user speaks Sinhala. Keep answers helpful, short and fun. Use emojis. Don't say you are an AI model."}
];

function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        selectedImage = e.target.result;
        chatBox.innerHTML += `<div class="msg user-msg">Photo uploaded:<img src="${selectedImage}" class="preview-img"></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        inputField.placeholder = "Photo එක ගැන අහන්න...";
    };
    reader.readAsDataURL(file);
}

async function sendMessage() {
    const userText = inputField.value.trim();
    if (!userText &&!selectedImage) return;

    if (selectedImage) {
        chatBox.innerHTML += `<div class="msg user-msg">${userText || 'මේ photo එකේ තියෙන series/movie එක මොකක්ද? විස්තර කියන්න.'}</div>`;
    } else {
        chatBox.innerHTML += `<div class="msg user-msg">${escapeHtml(userText)}</div>`;
    }

    inputField.value = "";
    inputField.placeholder = "Message or upload photo...";
    chatBox.scrollTop = chatBox.scrollHeight;
    sendBtn.disabled = true;

    const loadingId = 'loading-' + Date.now();
    chatBox.innerHTML += `<div class="msg ai-msg" id="${loadingId}"><div class="typing"><span></span><span></span></div></div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        let messages = [...chatHistory];

        if (selectedImage) {
            messages.push({
                role: "user",
                content: [
                    {type: "text", text: userText || "What movie or TV series is shown in this image? Identify it and give me details like plot, rating, main cast, and where to watch. Answer in Sinhala."},
                    {type: "image_url", image_url: {url: selectedImage}}
                ]
            });
        } else {
            messages.push({role: "user", content: userText});
        }

        const endpoint = "https://text.pollinations.ai/openai";

        const response = await fetch(endpoint, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "gpt-4o",
                messages: messages,
                max_tokens: 800,
                temperature: 0.7
            })
        });

        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();
        const aiReply = data.choices[0].message.content;

        chatHistory.push({role: "user", content: selectedImage? "[Image] " + (userText || "Identify this") : userText});
        chatHistory.push({role: "assistant", content: aiReply});

        document.getElementById(loadingId).remove();
        chatBox.innerHTML += `<div class="msg ai-msg">${escapeHtml(aiReply)}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        document.getElementById(loadingId).remove();
        chatBox.innerHTML += `<div class="msg ai-msg" style="color:#ff4757;">සමාවෙන්න, Image එක analyze කරන්න බැරි උනා 😔<br>Photo එක clear ද? ආයේ try කරන්න.</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        console.error(error);
    } finally {
        sendBtn.disabled = false;
        selectedImage = null;
        document.getElementById('imageInput').value = '';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

inputField.addEventListener("keypress", function(event) {
    if (event.key === "Enter" &&!sendBtn.disabled) {
        sendMessage();
    }
});
</script>

</body>
</html>
