<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Music - Cinemax Elite</title>
<link href="https://fonts.googleapis.com/css2?family=YouTube+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#FF0000;
  --bg:#0f0f0f;
  --bg2:#1a1a1a;
  --bg3:#272727;
  --bg4:#3d3d3d;
  --t1:#ffffff;
  --t2:#aaaaaa;
  --t3:#717171;
}
html,body{
  background:var(--bg);
  color:var(--t1);
  font-family:'Roboto',sans-serif;
  min-height:100vh;
}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:99;
  background:var(--bg);
  display:flex;align-items:center;
  padding:0 16px;height:56px;gap:12px;
  border-bottom:1px solid var(--bg3);
}
.back-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;color:var(--t1);
}
.back-btn:hover{background:var(--bg3)}
.back-btn svg{width:22px;height:22px}
.tb-title{font-size:18px;font-weight:700;flex:1}

/* YOUTUBE SEARCH */
.yt-search-box{
  padding:16px;
  display:flex;gap:10px;
  position:sticky;top:56px;z-index:98;background:var(--bg);
}
.yt-search-input{
  flex:1;background:var(--bg2);border:none;outline:none;
  color:var(--t1);font-size:15px;padding:12px 16px;
  border-radius:24px;font-family:'Roboto',sans-serif;
}
.yt-search-input::placeholder{color:var(--t3)}
.yt-search-btn{
  padding:12px 24px;background:var(--red);color:#fff;
  border:none;border-radius:24px;font-size:14px;font-weight:700;
  cursor:pointer;transition:background.15s;
}
.yt-search-btn:hover{background:#cc0000}
.yt-search-btn:active{transform:scale(.97)}
.yt-search-btn:disabled{background:var(--bg4);cursor:not-allowed}

/* YOUTUBE RESULTS */
.yt-results{
  padding:0 16px 16px;
  display:grid;gap:12px;
}
.yt-video{
  background:var(--bg2);border-radius:8px;overflow:hidden;
  cursor:pointer;transition:background.15s;
  display:flex;gap:12px;
}
.yt-video:hover{background:var(--bg3)}
.yt-video:active{transform:scale(.98)}
.yt-thumb-wrap{
  width:160px;height:90px;flex-shrink:0;position:relative;
}
.yt-thumb{
  width:100%;height:100%;object-fit:cover;display:block;
}
.yt-duration{
  position:absolute;bottom:4px;right:4px;
  background:rgba(0,0,0,.8);color:#fff;
  font-size:11px;font-weight:600;padding:1px 4px;border-radius:2px;
}
.yt-info{padding:8px 8px 8px 0;flex:1;min-width:0}
.yt-title{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.yt-channel{font-size:12px;color:var(--t3);margin-bottom:2px}
.yt-meta{font-size:11px;color:var(--t3)}

/* YOUTUBE PLAYER MODAL */
.yt-player-modal{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.95);
  align-items:center;justify-content:center;
  padding:16px;
}
.yt-player-modal.open{display:flex}
.yt-player-wrap{
  width:100%;max-width:900px;aspect-ratio:16/9;
  position:relative;
}
.yt-player-wrap iframe{
  width:100%;height:100%;border:none;border-radius:8px;
}
.yt-close{
  position:absolute;top:-44px;right:0;
  width:36px;height:36px;background:var(--bg3);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t1);transition:background.15s;
}
.yt-close:hover{background:var(--bg4)}
.yt-close svg{width:20px;height:20px}

/* LOADING */
.loading{
  padding:40px 16px;text-align:center;color:var(--t3);font-size:14px;
}
.spinner{
  width:32px;height:32px;border:3px solid var(--bg3);
  border-top-color:var(--red);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error{
  padding:40px 16px;text-align:center;color:var(--t3);font-size:14px;
}
.error-title{color:var(--red);font-weight:700;margin-bottom:8px}

/* TRENDING TAGS */
.trending-tags{
  padding:0 16px 16px;
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
}
.trending-tags::-webkit-scrollbar{display:none}
.trend-chip{
  flex-shrink:0;padding:8px 16px;border-radius:20px;
  background:var(--bg2);color:var(--t1);
  font-size:13px;font-weight:500;cursor:pointer;
  border:none;white-space:nowrap;transition:all.15s;
}
.trend-chip:hover{background:var(--bg3)}
.trend-chip:active{transform:scale(.95)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="back-btn" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
  </div>
  <div class="tb-title">YouTube Music</div>
</div>

<!-- SEARCH BOX -->
<div class="yt-search-box">
  <input type="text" class="yt-search-input" id="ytSearchInput" placeholder="Search songs, artists, albums..." onkeypress="if(event.key==='Enter')searchYouTube()">
  <button class="yt-search-btn" id="searchBtn" onclick="searchYouTube()">Search</button>
</div>

<!-- TRENDING TAGS -->
<div class="trending-tags">
  <button class="trend-chip" onclick="quickSearch('trending songs 2024')">🔥 Trending</button>
  <button class="trend-chip" onclick="quickSearch('arijit singh')">Arijit Singh</button>
  <button class="trend-chip" onclick="quickSearch('taylor swift')">Taylor Swift</button>
  <button class="trend-chip" onclick="quickSearch('sinhala songs')">Sinhala</button>
  <button class="trend-chip" onclick="quickSearch('kpop')">K-Pop</button>
  <button class="trend-chip" onclick="quickSearch('bollywood hits')">Bollywood</button>
</div>

<!-- RESULTS -->
<div class="yt-results" id="ytResults">
  <div class="loading">Search for songs to play</div>
</div>

<!-- PLAYER MODAL -->
<div class="yt-player-modal" id="ytPlayerModal" onclick="closePlayer(event)">
  <div class="yt-player-wrap" onclick="event.stopPropagation()">
    <div class="yt-close" onclick="closePlayer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <iframe id="ytPlayer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
// YouTube API Key
const YT_API_KEY = 'AIzaSyCdjXsiUaDD8iJ02b5ps2vXuzHGncSaACw';
const YT_API_URL = 'https://www.googleapis.com/youtube/v3';

async function searchYouTube(){
  const query = document.getElementById('ytSearchInput').value.trim();
  if(!query){
    alert('Enter a song name');
    return;
  }
  
  const results = document.getElementById('ytResults');
  const searchBtn = document.getElementById('searchBtn');
  searchBtn.disabled = true;
  results.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';
  
  try {
    const searchRes = await fetch(`${YT_API_URL}/search?part=snippet&q=${encodeURIComponent(query + ' song')}&type=video&videoCategoryId=10&maxResults=20&key=${YT_API_KEY}`);
    const searchData = await searchRes.json();
    
    if(searchData.error){
      throw new Error(searchData.error.message);
    }
    
    if(!searchData.items || searchData.items.length === 0){
      results.innerHTML = '<div class="error"><div class="error-title">No Results</div>No songs found for "' + query + '"</div>';
      searchBtn.disabled = false;
      return;
    }
    
    const videoIds = searchData.items.map(item => item.id.videoId).join(',');
    const detailsRes = await fetch(`${YT_API_URL}/videos?part=contentDetails,statistics&id=${videoIds}&key=${YT_API_KEY}`);
    const detailsData = await detailsRes.json();
    
    const videos = searchData.items.map(item => {
      const details = detailsData.items.find(v => v.id === item.id.videoId);
      return {
        id: item.id.videoId,
        title: item.snippet.title,
        channel: item.snippet.channelTitle,
        thumbnail: item.snippet.thumbnails.medium.url,
        duration: details ? formatDuration(details.contentDetails.duration) : '',
        views: details ? formatViews(details.statistics.viewCount) : ''
      };
    });
    
    results.innerHTML = videos.map(video=>`
      <div class="yt-video" onclick="playVideo('${video.id}')">
        <div class="yt-thumb-wrap">
          <img src="${video.thumbnail}" class="yt-thumb" alt="${video.title}">
          <div class="yt-duration">${video.duration}</div>
        </div>
        <div class="yt-info">
          <div class="yt-title">${video.title}</div>
          <div class="yt-channel">${video.channel}</div>
          <div class="yt-meta">${video.views} views</div>
        </div>
      </div>
    `).join('');
    
  } catch(err) {
    console.error(err);
    results.innerHTML = `<div class="error">
      <div class="error-title">Error</div>
      ${err.message || 'Failed to search. Check API key or quota.'}
    </div>`;
  }
  
  searchBtn.disabled = false;
}

function quickSearch(query){
  document.getElementById('ytSearchInput').value = query;
  searchYouTube();
}

function playVideo(videoId){
  const modal = document.getElementById('ytPlayerModal');
  const player = document.getElementById('ytPlayer');
  player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  modal.classList.add('open');
}

function closePlayer(e){
  if(!e || e.target === document.getElementById('ytPlayerModal')){
    const modal = document.getElementById('ytPlayerModal');
    const player = document.getElementById('ytPlayer');
    player.src = '';
    modal.classList.remove('open');
  }
}

function formatDuration(iso){
  const match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  const h = parseInt(match[1]||0);
  const m = parseInt(match[2]||0);
  const s = parseInt(match[3]||0);
  if(h) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function formatViews(count){
  const n = parseInt(count);
  if(n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if(n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

// Load trending songs on page load
window.onload = () => {
  document.getElementById('ytSearchInput').value = 'trending songs 2024';
  searchYouTube();
};
</script>

</body>
</html>
