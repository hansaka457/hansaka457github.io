<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CINEMAX 🔥 – Subtitles</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1c1c28;
      --border: #2a2a3a;
      --accent: #e50914;
      --text: #e8e8f0;
      --muted: #7a7a99;
      --radius: 10px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
   .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-decoration: none;
    }
   .logo span { color: var(--text); }
   .back-link {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      transition: all 0.2s;
    }
   .back-link:hover { color: var(--text); border-color: var(--accent); }

   .container {
      padding: 90px 28px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Trailer Player */
   .trailer-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 40px;
      border: 1px solid var(--border);
    }
   .trailer-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Series Info */
   .series-header {
      margin-bottom: 30px;
    }
   .series-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
   .series-desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* Season Toggle */
   .season-bar {
      display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
    }
   .season-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
   .season-btn.active {
      background: rgba(229,9,20,0.15);
      border-color: var(--accent);
      color: var(--text);
    }

    /* Episode Grid */
   .ep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }
   .ep-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.22s;
      position: relative;
      overflow: hidden;
    }
   .ep-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s;
    }
   .ep-card:hover { border-color: var(--accent); transform: translateY(-2px); }
   .ep-card:hover::before { transform: scaleY(1); }
   .ep-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      color: var(--accent);
      min-width: 44px;
      line-height: 1;
    }
   .ep-info { flex: 1; min-width: 0; }
   .ep-label {
      font-size: 0.78rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
   .ep-sub {
      font-size: 0.7rem; color: var(--muted);
      margin-top: 2px;
    }
   .dl-icon {
      font-size: 1.1rem; opacity: 0.5;
      transition: opacity 0.2s;
    }
   .ep-card:hover.dl-icon { opacity: 1; }

    @media (max-width: 600px) {
     .container { padding: 80px 16px 40px; }
     .series-title { font-size: 2.2rem; }
     .ep-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CINE<span>MAX</span> 🔥</a>
  <a href="index.html" class="back-link">← ආපසු</a>
</nav>

<div class="container">
  <!-- Trailer -->
  <div class="trailer-wrap">
    <video id="trailer" controls autoplay muted playsinline></video>
  </div>

  <!-- Series Info -->
  <div class="series-header">
    <h1 class="series-title" id="s-title">Loading...</h1>
    <p class="series-desc" id="s-desc"></p>
  </div>

  <!-- Season Buttons -->
  <div class="season-bar" id="season-bar"></div>

  <!-- Episodes -->
  <div class="ep-grid" id="ep-grid"></div>
</div>

<script>
  const BASE = 'https://raw.githubusercontent.com/hansaka457/hansaka457github.io/main/data/';

  const SERIES_DATA = {
    wednesday: {
      title: 'Wednesday',
      desc: 'Wednesday Addams ගේ Nevermore Academy ජීවිතය. සිංහල උපසිරසි සමග සම්පූර්ණ Season 1 සහ 2.',
      trailer: 'wednesday-edit.mp4',
      seasons: { 1: 8, 2: 8 },
      prefix: 'wednesday'
    },
    wonderfools: {
      title: 'The Wonderfools',
      desc: 'ශ්‍රී ලංකාවේ ප්‍රසිද්ධ The Wonderfools සීරීස් එක. සිංහල උපසිරසි සමග.',
      trailer: 'thewonderfools_sinhala.mp4',
      seasons: { 1: 8 },
      prefix: 'thewonderfools'
    },
    from: {
      title: 'From',
      desc: 'රහස්‍යමය නගරයක තුල සිරවූ පිරිසක්. Season 1-4 සිංහල උපසිරසි සමග.',
      trailer: 'from-edit.mp4',
      seasons: { 1: 10, 2: 10, 3: 9, 4: 3 },
      prefix: 'from'
    }
  };

  // URL එකෙන් series එක ගන්න
  const params = new URLSearchParams(window.location.search);
  const seriesKey = params.get('s') || 'wednesday';
  const series = SERIES_DATA[seriesKey];

  // Trailer set කරන්න
  document.getElementById('trailer').src = series.trailer;
  document.getElementById('s-title').textContent = series.title;
  document.getElementById('s-desc').textContent = series.desc;
  document.title = series.title + ' - CINEMAX';

  // Season buttons හදන්න
  const seasonBar = document.getElementById('season-bar');
  const epGrid = document.getElementById('ep-grid');

  Object.keys(series.seasons).forEach((season, idx) => {
    const btn = document.createElement('button');
    btn.className = 'season-btn' + (idx === 0? ' active' : '');
    btn.textContent = 'Season ' + season;
    btn.onclick = () => showSeason(season, btn);
    seasonBar.appendChild(btn);
  });

  function showSeason(seasonNum, btn) {
    document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    epGrid.innerHTML = '';
    const epCount = series.seasons[seasonNum];

    for (let i = 1; i <= epCount; i++) {
      let filename = `${series.prefix}_${seasonNum}-${i}_sinhala.srt`;

      // From Season 4 special case
      if (seriesKey === 'from' && seasonNum == 4 && i <= 2) {
        filename = `from_4-${i}_sinhala-1.srt`;
      } else if (seriesKey === 'from' && seasonNum == 4 && i == 3) {
        filename = `from_4-3_sinhala.srt`;
      }

      const url = BASE + filename;
      epGrid.innerHTML += `
        <a class="ep-card" href="${url}" download="${filename}">
          <div class="ep-num">${String(i).padStart(2,'0')}</div>
          <div class="ep-info">
            <div class="ep-label">Episode ${i}</div>
            <div class="ep-sub">SRT · සිංහල</div>
          </div>
          <div class="dl-icon">⬇</div>
        </a>`;
    }
  }

  // First season load කරන්න
  showSeason(Object.keys(series.seasons)[0], document.querySelector('.season-btn'));
</script>
</body>
</html>
